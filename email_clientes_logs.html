<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Clientes — Logs de Envio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="shortcut icon" href="/images/Logo Camim-01_200px.png" type="image/x-icon">
  <style>
    :root { --sidebar-w: 220px; --sidebar-bg: #1a1d2e; --sidebar-active: #16213e; }
    body { display: flex; min-height: 100vh; background: #f0f2f5; margin: 0; }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w); min-width: var(--sidebar-w);
      background: var(--sidebar-bg); color: #aab;
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 200;
      overflow-y: auto;
    }
    #sidebar .brand {
      padding: 1rem 1.2rem; font-weight: 700; font-size: .95rem;
      color: #fff; border-bottom: 1px solid #2d3050;
      display: flex; align-items: center; gap: .6rem; flex-shrink: 0;
    }
    #sidebar .brand i { color: #4dabf7; font-size: 1.2rem; }
    .nav-section {
      padding: .5rem 1.2rem .15rem;
      font-size: .65rem; text-transform: uppercase;
      color: #4a5070; letter-spacing: .08em; margin-top: .4rem;
    }
    #sidebar a.nav-link {
      color: #8892b0; padding: .6rem 1.2rem;
      display: flex; align-items: center; gap: .55rem;
      font-size: .875rem; border-left: 3px solid transparent;
      transition: background .15s, color .15s; text-decoration: none;
    }
    #sidebar a.nav-link:hover { background: #232640; color: #cdd; }
    #sidebar a.nav-link.active { background: var(--sidebar-active); color: #fff; border-left-color: #4dabf7; }
    .sidebar-spacer { flex: 1; }
    .sidebar-footer { border-top: 1px solid #2d3050; padding: .5rem 0; flex-shrink: 0; }

    /* ── Main ── */
    #main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-width: 0; }
    #topbar {
      background: #fff; border-bottom: 1px solid #e2e6ea;
      padding: .65rem 1.5rem; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .page-content { padding: 1.5rem; }
    .stat-card { border: none; border-radius: .6rem; box-shadow: 0 1px 6px rgba(0,0,0,.07); }

    .table th { font-size: .78rem; }
    .table td { font-size: .82rem; vertical-align: middle; }
    .posto-badge { font-size: .72rem; }
    .cat-cell { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }

    /* ── Hamburger button (hidden on desktop) ─── */
    #hamburger {
      display: none;
      background: none; border: none; cursor: pointer;
      padding: 4px 8px; margin-right: 8px;
      color: #4dabf7; font-size: 1.3rem; line-height: 1;
      align-items: center;
    }
    /* ── Sidebar overlay (mobile only) ──────── */
    #sidebar-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 199;
    }
    @media (max-width: 767px) {
      #sidebar {
        transform: translateX(-100%);
        transition: transform .25s ease;
        box-shadow: none;
      }
      #sidebar.mobile-open {
        transform: translateX(0);
        box-shadow: 4px 0 20px rgba(0,0,0,.3);
      }
      #sidebar.mobile-open + #sidebar-overlay { display: block; }
      #main { margin-left: 0 !important; }
      #hamburger { display: flex !important; }
      .page-content { padding: 1rem .75rem; }
      .kpi-val { font-size: 1.5rem !important; }
      .kpi-label { font-size: .7rem; }
    }
  </style>
</head>
<body>

<!-- ═══ SIDEBAR ═══ -->
<div id="sidebar">
  <div class="brand">
    <i class="bi bi-envelope-fill"></i>
    Email Clientes
  </div>

  <nav class="mt-1">
    <div class="nav-section">Painel</div>
    <a href="/email_clientes" class="nav-link">
      <i class="bi bi-speedometer2"></i> Dashboard
    </a>
    <a href="/email_clientes/logs" class="nav-link active">
      <i class="bi bi-table"></i> Logs de Envio
    </a>

    <div class="nav-section mt-2">Navegação</div>
    <a href="/index.html" class="nav-link">
      <i class="bi bi-house"></i> Home Page
    </a>
    <a href="/monitorarrobos" class="nav-link">
      <i class="bi bi-speedometer2"></i> Indicadores
    </a>
    {% if USER_IS_ADMIN %}
    <a href="/admin" class="nav-link">
      <i class="bi bi-person-gear"></i> Admin
    </a>
    {% endif %}
    <a href="/mais_servicos" class="nav-link">
      <i class="bi bi-grid-3x3-gap"></i> Mais Serviços
    </a>
  </nav>

  <div class="sidebar-spacer"></div>

  <div class="sidebar-footer">
    <form method="POST" action="/session/logout" style="display:inline;width:100%">
      <button type="submit" class="nav-link btn btn-link w-100 text-start" style="color:#e06c75;border:none;background:none">
        <i class="bi bi-box-arrow-left"></i> Sair
      </button>
    </form>
  </div>
</div>

<div id="sidebar-overlay"></div>

<!-- ═══ MAIN ═══ -->
<div id="main">
  <div id="topbar">
    <button id="hamburger" aria-label="Menu">&#9776;</button>
    <div>
      <small class="text-muted">
        <i class="bi bi-envelope-fill me-1" style="color:#4dabf7"></i>
        Logs de Envio
      </small>
    </div>
    <div>
      <small class="text-muted" id="clock"></small>
    </div>
  </div>

  <div class="page-content">

    <!-- ── Barra de filtros ── -->
    <div class="card stat-card mb-3">
      <div class="card-body py-2">
        <div class="row g-2 align-items-end">
          <div class="col-auto">
            <label class="form-label small mb-1">Posto</label>
            <select class="form-select form-select-sm" id="filterPosto">
              <option value="">Todos</option>
              <option value="A">A – Anchieta</option>
              <option value="N">N – Nilópolis</option>
              <option value="I">I – Nova Iguaçu</option>
              <option value="X">X – CGX</option>
              <option value="G">G – Campo Grande</option>
              <option value="Y">Y – CGY</option>
              <option value="B">B – Bangu</option>
              <option value="R">R – Realengo</option>
              <option value="M">M – Madureira</option>
              <option value="C">C – Campinho</option>
              <option value="D">D – Del Castilho</option>
              <option value="J">J – JPA</option>
              <option value="P">P – Rio das Pedras</option>
            </select>
          </div>
          <div class="col-auto">
            <label class="form-label small mb-1">Categoria</label>
            <select class="form-select form-select-sm" id="filterCategoria" style="max-width:220px">
              <option value="">Todas</option>
            </select>
          </div>
          <div class="col-auto">
            <label class="form-label small mb-1">Status</label>
            <select class="form-select form-select-sm" id="filterStatus" style="max-width:200px">
              <option value="">Todos</option>
            </select>
          </div>
          <div class="col-auto">
            <label class="form-label small mb-1">Matrícula</label>
            <input type="text" class="form-control form-control-sm" id="filterMatricula"
                   placeholder="Ex: 12345" style="width:110px">
          </div>
          <div class="col-auto">
            <label class="form-label small mb-1">De</label>
            <input type="date" class="form-control form-control-sm" id="filterDateFrom">
          </div>
          <div class="col-auto">
            <label class="form-label small mb-1">Até</label>
            <input type="date" class="form-control form-control-sm" id="filterDateTo">
          </div>
          <div class="col-auto">
            <button class="btn btn-primary btn-sm" onclick="loadLogs(1)">
              <i class="bi bi-search me-1"></i>Filtrar
            </button>
            <button class="btn btn-outline-secondary btn-sm ms-1" onclick="clearFilters()">
              <i class="bi bi-x-lg me-1"></i>Limpar
            </button>
          </div>
          <div class="col-auto ms-auto">
            <span class="text-muted small" id="totalCount"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Contagem por posto ── -->
    <div id="postoCounts" class="mb-3 d-flex flex-wrap gap-2" style="display:none!important"></div>

    <!-- ── Tabela ── -->
    <div class="card stat-card">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover table-bordered mb-0">
            <thead class="table-dark">
              <tr>
                <th>#</th>
                <th>Data/Hora</th>
                <th>Posto</th>
                <th>Matrícula</th>
                <th>Categoria</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="logsBody">
              <tr><td colspan="6" class="text-center py-4 text-muted">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ── Paginação ── -->
    <div class="d-flex justify-content-center mt-3" id="pagination"></div>

    <!-- ── Modal: Visualização do email ── -->
    <div class="modal fade" id="msgModal" tabindex="-1">
      <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header py-2">
            <h6 class="modal-title" id="msgModalTitle"></h6>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body p-0" id="msgModalBody" style="min-height:400px"></div>
        </div>
      </div>
    </div>

  </div><!-- /page-content -->
</div><!-- /main -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const POSTOS_NAMES = {
  'A': 'Anchieta', 'N': 'Nilópolis', 'I': 'Nova Iguaçu', 'X': 'CGX',
  'G': 'Campo Grande', 'Y': 'CGY', 'B': 'Bangu', 'R': 'Realengo',
  'M': 'Madureira', 'C': 'Campinho', 'D': 'Del Castilho', 'J': 'JPA',
  'P': 'Rio das Pedras',
};

let currentPage = 1;
let _rowData = {}; // id → {titulo_categoria, mensagem}

function getFilters() {
  return {
    posto:     document.getElementById('filterPosto').value,
    categoria: document.getElementById('filterCategoria').value,
    status:    document.getElementById('filterStatus').value,
    matricula: document.getElementById('filterMatricula').value,
    date_from: document.getElementById('filterDateFrom').value,
    date_to:   document.getElementById('filterDateTo').value,
  };
}

function clearFilters() {
  ['filterPosto','filterCategoria','filterStatus','filterMatricula','filterDateFrom','filterDateTo']
    .forEach(id => document.getElementById(id).value = '');
  loadLogs(1);
}

async function loadFilters() {
  try {
    const resp = await fetch('/api/email_clientes/filters');
    const data = await resp.json();
    if (data.erro) return;

    const selCat = document.getElementById('filterCategoria');
    data.categorias.forEach(c => {
      const o = document.createElement('option');
      o.value = c; o.textContent = c;
      selCat.appendChild(o);
    });

    const selSt = document.getElementById('filterStatus');
    data.statuses.forEach(s => {
      const o = document.createElement('option');
      o.value = s; o.textContent = s;
      selSt.appendChild(o);
    });
  } catch(e) { /* silencia */ }
}

async function loadLogs(page) {
  currentPage = page;
  const f = getFilters();
  const params = new URLSearchParams({ page });
  Object.entries(f).forEach(([k, v]) => { if (v) params.set(k, v); });

  try {
    const resp = await fetch('/api/email_clientes/logs?' + params);
    const data = await resp.json();
    if (data.erro || !data.rows) {
      document.getElementById('logsBody').innerHTML =
        `<tr><td colspan="6" class="text-center text-danger py-3">${data.erro || 'Resposta inválida da API'}</td></tr>`;
      document.getElementById('totalCount').textContent = '';
      document.getElementById('pagination').innerHTML = '';
      return;
    }
    renderTable(data);
    renderPagination(data);
    renderPostoCounts(data.por_posto);
    document.getElementById('totalCount').textContent =
      data.total.toLocaleString('pt-BR') + ' registros';
  } catch(e) {
    document.getElementById('logsBody').innerHTML =
      `<tr><td colspan="6" class="text-center text-danger py-3">Erro: ${e.message}</td></tr>`;
  }
}

function renderTable(data) {
  const tbody = document.getElementById('logsBody');
  if (!data.rows.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">Nenhum registro encontrado</td></tr>';
    return;
  }
  _rowData = {};
  data.rows.forEach(r => { _rowData[r.id] = { titulo: r.titulo_categoria, msg: r.mensagem }; });
  tbody.innerHTML = data.rows.map(r => `
    <tr style="cursor:pointer" data-rid="${r.id}" title="Clique para ver a mensagem do email">
      <td class="text-muted">${r.id}</td>
      <td>${fmtDt(r.datahora)}</td>
      <td>
        <span class="badge bg-dark posto-badge">${r.posto || '–'}</span>
        <small class="text-muted ms-1 d-none d-lg-inline">${POSTOS_NAMES[r.posto] || ''}</small>
      </td>
      <td>${esc(r.matricula) || '–'}</td>
      <td>${esc(r.titulo_categoria) || '–'}</td>
      <td>${esc(r.status) || '–'}</td>
    </tr>
  `).join('');
  tbody.querySelectorAll('tr[data-rid]').forEach(tr => {
    tr.addEventListener('click', () => {
      const d = _rowData[tr.dataset.rid];
      if (d) showMsg(d.titulo, d.msg);
    });
  });
}

function renderPostoCounts(porPosto) {
  const wrap = document.getElementById('postoCounts');
  if (!porPosto || !porPosto.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';
  wrap.innerHTML =
    '<small class="text-muted me-1 align-self-center">Por posto:</small>' +
    porPosto.map(p => `
      <span class="badge rounded-pill text-bg-light border" style="font-size:.75rem">
        <strong>${p.posto}</strong>
        <span class="text-muted ms-1">${POSTOS_NAMES[p.posto] || p.posto}</span>
        <span class="ms-1 text-dark">${p.cnt.toLocaleString('pt-BR')}</span>
      </span>`).join('');
}

function renderPagination(data) {
  const total = Math.ceil(data.total / data.per_page);
  const pag = document.getElementById('pagination');
  if (total <= 1) { pag.innerHTML = ''; return; }

  const cur = data.page;
  let items = '';
  items += `<li class="page-item ${cur===1?'disabled':''}">
    <a class="page-link" href="#" onclick="loadLogs(${cur-1});return false">«</a></li>`;

  const start = Math.max(1, cur-2), end = Math.min(total, cur+2);
  for (let i = start; i <= end; i++) {
    items += `<li class="page-item ${i===cur?'active':''}">
      <a class="page-link" href="#" onclick="loadLogs(${i});return false">${i}</a></li>`;
  }
  items += `<li class="page-item ${cur===total?'disabled':''}">
    <a class="page-link" href="#" onclick="loadLogs(${cur+1});return false">»</a></li>`;

  pag.innerHTML = `<ul class="pagination pagination-sm">${items}</ul>`;
}

function fmtDt(dt) {
  if (!dt) return '–';
  return dt.replace('T', ' ').substring(0, 16);
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                  .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function showMsg(title, msg) {
  document.getElementById('msgModalTitle').textContent = title;
  const body = document.getElementById('msgModalBody');
  if (msg && msg.trim()) {
    // Renderiza o HTML do email num iframe isolado (sandbox bloqueia scripts)
    const iframe = document.createElement('iframe');
    iframe.style.cssText = 'width:100%;height:600px;border:none;display:block';
    iframe.sandbox = 'allow-same-origin';
    body.innerHTML = '';
    body.appendChild(iframe);
    iframe.srcdoc = msg;
  } else {
    body.innerHTML = '<div class="p-3 text-muted">Mensagem não disponível (sync anterior ao campo ser adicionado).</div>';
  }
  new bootstrap.Modal(document.getElementById('msgModal')).show();
}

// Enter no campo matrícula dispara filtro
document.getElementById('filterMatricula').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadLogs(1);
});

// Relógio
setInterval(() => {
  document.getElementById('clock').textContent =
    new Date().toLocaleString('pt-BR', {dateStyle:'short', timeStyle:'short'});
}, 1000);

loadFilters();
loadLogs(1);
setInterval(() => loadLogs(currentPage), 60000);
</script>
<script>
// Mobile sidebar toggle
(function() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebar-overlay');
  const hb = document.getElementById('hamburger');
  if (!sb || !ov || !hb) return;
  function open()  { sb.classList.add('mobile-open');    document.body.style.overflow='hidden'; }
  function close() { sb.classList.remove('mobile-open'); document.body.style.overflow='';       }
  hb.addEventListener('click', open);
  ov.addEventListener('click', close);
})();
</script>

<script src="/js/menu_enforce.js" defer></script>
</body>
</html>
