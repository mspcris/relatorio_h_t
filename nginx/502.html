    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
      padding: 20px;
      overflow: hidden;
    }
    .card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .logo { font-size: 2rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -1px; }
    .logo span { color: #4facfe; }
    .subtitle { font-size: .85rem; opacity: 0.5; margin-bottom: 24px; }

    .progress-wrap {
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      height: 6px;
      margin: 0 20px 20px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      border-radius: 8px;
      background: linear-gradient(90deg, #4facfe, #00f2fe, #4facfe);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease infinite, grow 30s ease-out forwards;
      width: 0%;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    @keyframes grow { 0%{width:0%} 30%{width:45%} 60%{width:70%} 80%{width:85%} 100%{width:95%} }

    .phrase {
      font-size: 1.05rem;
      min-height: 3.2em;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      transition: opacity .4s;
      line-height: 1.5;
    }

    .retry-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 32px;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      border: none;
      border-radius: 12px;
      color: #1a1a2e;
      font-size: .95rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
    }
    .retry-btn:hover { transform: scale(1.03); box-shadow: 0 4px 20px rgba(79,172,254,0.4); }
    .retry-btn:active { transform: scale(0.97); }

    .timer { font-size: .78rem; opacity: 0.4; margin-top: 14px; }

    .particles {
      position: fixed; inset: 0; pointer-events: none; z-index: -1;
    }
    .particle {
      position: absolute;
      width: 4px; height: 4px;
      background: rgba(79,172,254,0.3);
      border-radius: 50%;
      animation: float linear infinite;
    }
    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }
  </style>

var idx = 0;
var el = document.getElementById('phrase');

function nextPhrase() {
  el.style.opacity = '0';
  setTimeout(function() {
    idx = (idx + 1) % phrases.length;
    el.innerHTML = phrases[idx];
    el.style.opacity = '1';
  }, 400);
}

setInterval(nextPhrase, 3000);

// Shuffle on load
for (var i = phrases.length - 1; i > 0; i--) {
  var j = Math.floor(Math.random() * (i + 1));
  var t = phrases[i]; phrases[i] = phrases[j]; phrases[j] = t;
}
el.innerHTML = phrases[0];

// Countdown + auto reload
var secs = 15;
var timerEl = document.getElementById('timer');
setInterval(function() {
  secs--;
  if (secs <= 0) { location.reload(); return; }
  timerEl.textContent = 'Tentando reconectar em ' + secs + 's...';
}, 1000);

// Particles
var pc = document.getElementById('particles');
for (var p = 0; p < 20; p++) {
  var d = document.createElement('div');
  d.className = 'particle';
  d.style.left = Math.random() * 100 + '%';
  d.style.animationDuration = (6 + Math.random() * 8) + 's';
  d.style.animationDelay = Math.random() * 8 + 's';
  d.style.width = d.style.height = (2 + Math.random() * 4) + 'px';
  pc.appendChild(d);
}
