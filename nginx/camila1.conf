# ============================================================================
# vhost: camila1.ia.camim.com.br  ->  wpp-campanhas (Flask, porta 8023)
# ----------------------------------------------------------------------------
# Destino final na VM: /etc/nginx/sites-available/camila1
#                      (symlink /etc/nginx/sites-enabled/camila1 -> este arquivo)
#
# Deployado automaticamente por .github/workflows/deploy.yml.
# Para alterar, edite este arquivo e faça commit — NÃO edite direto na VM.
# ============================================================================

# Bloco HTTP -> redireciona para HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name camila1.ia.camim.com.br;
    return 301 https://$host$request_uri;
}

# Bloco HTTPS -> WPP Campanhas (porta 8023)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name camila1.ia.camim.com.br;

    ssl_certificate     /etc/letsencrypt/live/camila1.ia.camim.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/camila1.ia.camim.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    # -------------------------------------------------------------------------
    # Ativos estáticos compartilhados (servidos direto do /var/www)
    # Evita passar imagens/css/js pelo Flask — idêntico ao que teste-ia serve.
    # -------------------------------------------------------------------------
    location ^~ /images/ { root /var/www; access_log off; expires 7d;  try_files $uri =404; }
    location ^~ /css/    { root /var/www; access_log off; expires 1h;  try_files $uri =404; }
    location ^~ /js/     { root /var/www; access_log off; expires 1h;  try_files $uri =404; }
    location ^~ /fonts/  { root /var/www; access_log off; expires 30d; try_files $uri =404; }

    location = /favicon.ico {
        alias /var/www/images/favicon-wpp.svg;
        access_log off;
        log_not_found off;
    }

    # -------------------------------------------------------------------------
    # Todo o resto vai para o Flask (wpp-campanhas.service)
    # -------------------------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:8023;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
