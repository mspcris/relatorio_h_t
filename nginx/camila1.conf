# ============================================================================
# vhost: camila1.ia.camim.com.br  ->  wpp-campanhas (Flask, porta 8023)
# ----------------------------------------------------------------------------
# Destino final na VM: /etc/nginx/sites-available/camila1
#                      (symlink /etc/nginx/sites-enabled/camila1 -> este arquivo)
#
# Deployado automaticamente por .github/workflows/deploy.yml.
# Para alterar, edite este arquivo e faça commit — NÃO edite direto na VM.
# ============================================================================

# Bloco HTTP -> redireciona para HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name camila1.ia.camim.com.br;
    return 301 https://$host$request_uri;
}

# Bloco HTTPS -> WPP Campanhas (porta 8023)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name camila1.ia.camim.com.br;

    ssl_certificate     /etc/letsencrypt/live/camila1.ia.camim.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/camila1.ia.camim.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    # -------------------------------------------------------------------------
    # Ativos estáticos compartilhados (servidos direto do /var/www)
    # Evita passar imagens/css/js pelo Flask — idêntico ao que teste-ia serve.
    # -------------------------------------------------------------------------
    location ^~ /images/ { root /var/www; access_log off; expires 7d;  try_files $uri =404; }
    location ^~ /css/    { root /var/www; access_log off; expires 1h;  try_files $uri =404; }
    location ^~ /js/     { root /var/www; access_log off; expires 1h;  try_files $uri =404; }
    location ^~ /fonts/  { root /var/www; access_log off; expires 30d; try_files $uri =404; }

    # -------------------------------------------------------------------------
    # Uploads de imagens para campanhas WhatsApp
    # -------------------------------------------------------------------------
    # Endpoint público (leitura): a Meta precisa baixar a imagem do header.
    # O upload (POST) acontece pelo Flask em /wpp/api/imagens (auth required).
    # Aqui só servimos arquivos já validados, com restrição forte:
    #   - Somente GET/HEAD (POST/PUT/DELETE → 405)
    #   - Somente extensões de imagem (jpg/jpeg/png/gif/webp)
    #   - Sem listing de diretório
    #   - X-Content-Type-Options: nosniff (impede que o browser execute como script)
    #   - Content-Disposition: inline + filename = nome do arquivo
    #   - access_log ON (auditoria)
    # -------------------------------------------------------------------------
    location ^~ /wpp-uploads/ {
        root /var/www;
        autoindex off;
        expires 30d;

        # Bloqueia métodos diferentes de GET/HEAD
        limit_except GET HEAD { deny all; }

        # Bloqueia qualquer URL com chars suspeitos (path traversal extra)
        if ($request_uri ~* "(\.\./|\\)") { return 404; }

        # Headers de segurança
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'none'; img-src 'self'; style-src 'none'; script-src 'none';" always;
        add_header Referrer-Policy "no-referrer" always;

        # Somente extensões de imagem permitidas
        location ~* ^/wpp-uploads/.+\.(jpg|jpeg|png|gif|webp)$ {
            root /var/www;
            expires 30d;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Content-Security-Policy "default-src 'none'; img-src 'self'; style-src 'none'; script-src 'none';" always;
            add_header Referrer-Policy "no-referrer" always;
            try_files $uri =404;
        }

        # Qualquer outra extensão (php, sh, py, html, svg, etc.) → 404
        return 404;
    }

    location = /favicon.ico {
        alias /var/www/images/favicon-wpp.svg;
        access_log off;
        log_not_found off;
    }

    # -------------------------------------------------------------------------
    # Todo o resto vai para o Flask (wpp-campanhas.service)
    # -------------------------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:8023;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
