# ============================================================================
# vhost: camila2.ia.camim.com.br  ->  agenda_f3 (Flask, porta 8024)
# ----------------------------------------------------------------------------
# Destino na VM: /etc/nginx/sites-available/camila2
#                (symlink /etc/nginx/sites-enabled/camila2 -> este arquivo)
#
# Deployado por .github/workflows/deploy.yml (step 8D).
# Para alterar: editar este arquivo e fazer commit.
# ============================================================================

# Bloco HTTP -> redireciona para HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name camila2.ia.camim.com.br;
    return 301 https://$host$request_uri;
}

# Bloco HTTPS -> agenda_f3 (porta 8024)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name camila2.ia.camim.com.br;

    ssl_certificate     /etc/letsencrypt/live/camila2.ia.camim.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/camila2.ia.camim.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 5m;

    # agenda_f3 é totalmente self-contained (CDN p/ JS+CSS, sem /css/ /js/ do KPI).
    # Não precisa servir nada de /var/www aqui.

    location = /favicon.ico {
        access_log off;
        log_not_found off;
        return 204;
    }

    location / {
        proxy_pass http://127.0.0.1:8024;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
