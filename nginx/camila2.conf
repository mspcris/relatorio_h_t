# ============================================================================
# vhost: camila2.ia.camim.com.br  ->  camila2 Flask (porta 8025)
# ----------------------------------------------------------------------------
# Destino final na VM: /etc/nginx/sites-available/camila2
#                      (symlink /etc/nginx/sites-enabled/camila2 -> este arquivo)
#
# Sessão é COMPARTILHADA com kpi.camim.com.br via cookie domain .camim.com.br.
# Quem está logado no KPI fica logado aqui automaticamente.
#
# Substitui o antigo container Docker meuchatbot (porta 8084), descontinuado
# em 2026-05-19.
# ============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name camila2.ia.camim.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name camila2.ia.camim.com.br;

    ssl_certificate     /etc/letsencrypt/live/camila2.ia.camim.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/camila2.ia.camim.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    # Ativos estáticos compartilhados (servidos direto do /var/www)
    location ^~ /images/ { root /var/www; access_log off; expires 7d;  try_files $uri =404; }
    location ^~ /css/    { root /var/www; access_log off; expires 1h;  try_files $uri =404; }
    location ^~ /js/     { root /var/www; access_log off; expires 1h;  try_files $uri =404; }
    location ^~ /fonts/  { root /var/www; access_log off; expires 30d; try_files $uri =404; }

    location = /favicon.ico {
        alias /var/www/images/favicon-wpp.svg;
        access_log off;
        log_not_found off;
    }

    # APIs do agenda_dia (e demais /api/*) vivem no KPI (camim-auth, porta 8020).
    # camila2 não as duplica; faz proxy pra reaproveitar a lógica + sessão.
    # O cookie appsess vale pra .camim.com.br, então a sessão flui.
    location /api/ {
        proxy_pass http://127.0.0.1:8020;
        proxy_http_version 1.1;
        proxy_set_header Host              kpi.camim.com.br;  # Flask gerou cookie domain pelo Host
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_redirect off;
    }

    # Todo o resto vai para o Flask camila2 (porta 8025)
    location / {
        proxy_pass http://127.0.0.1:8025;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
