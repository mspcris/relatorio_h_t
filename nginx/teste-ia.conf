# ============================================================================
# vhost: teste-ia.camim.com.br  ->  camim-auth (Flask, porta 8020)
# ----------------------------------------------------------------------------
# Destino final na VM: /etc/nginx/sites-available/teste-ia
#                      (editor direto do arquivo — NÃO symlink)
#
# Deployado automaticamente por .github/workflows/deploy.yml (step nginx).
# Para alterar, edite ESTE arquivo e faça commit — NÃO edite direto na VM.
#
# Política geral (2026-04-18):
#   TUDO só responde com cookie de sessão válido OU header X-Manus-Key válido.
#   Única exceção: rotas de autenticação (/login, /auth/*), ativos estáticos
#   (/css/, /js/, /fonts/, /images/), /favicon.ico, /health, e proxy para
#   Groq IA interno (/ia/, /prompts/).
# ============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name teste-ia.camim.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name teste-ia.camim.com.br;

    root /var/www;

    ssl_certificate     /etc/letsencrypt/live/teste-ia.camim.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/teste-ia.camim.com.br/privkey.pem;

    # Página de manutenção (502/503/504)
    error_page 502 503 504 /502.html;
    location = /502.html {
        root /etc/nginx;
        internal;
    }

    ##################################################
    # IA GROQ (público — Groq valida sua própria auth)
    ##################################################

    location ^~ /ia/ {
        proxy_pass http://127.0.0.1:8011;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /prompts/ {
        proxy_pass http://127.0.0.1:8011;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    ##################################################
    # Públicos mínimos (auth não aplicada)
    ##################################################

    location = /login {
        try_files /login.html =404;
    }

    location = /favicon.ico {
        try_files /favicon.ico =404;
    }

    location = /health {
        default_type text/plain;
        return 200 "OK\n";
    }

    # /auth/* — endpoints de autenticação (login, reset, callbacks OIDC)
    # Precisam ir ao Flask SEM auth_request (senão ninguém loga).
    location ^~ /auth/ {
        proxy_pass http://127.0.0.1:8020$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # /session/login e /session/logout e /session/me (rotas Flask)
    location ^~ /session/ {
        proxy_pass http://127.0.0.1:8020$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    ##################################################
    # Estáticos de UI (não contêm dados — liberados)
    ##################################################

    location ^~ /css/    { try_files $uri =404; }
    location ^~ /js/     { try_files $uri =404; }
    location ^~ /images/ { try_files $uri =404; }
    location ^~ /fonts/  { try_files $uri =404; }

    ##################################################
    # AUTH interno (usado por todos os auth_request)
    # Repassa cookie e header X-Manus-Key para o Flask validar.
    ##################################################

    location = /auth {
        internal;
        proxy_pass http://127.0.0.1:8020/auth;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Manus-Key $http_x_manus_key;
        proxy_set_header Cookie $http_cookie;
    }

    ##################################################
    # Aliases /kpi_* (sem .html) — redirects
    ##################################################

    location = /kpi_home              { return 301 /kpi_home.html; }
    location = /kpi_liberty           { return 301 /kpi_liberty.html; }
    location = /kpi_medicos           { return 301 /kpi_medicos.html; }
    location = /kpi_clientes          { return 301 /kpi_clientes.html; }
    location = /kpi_governo           { return 301 /kpi_governo.html; }
    location = /kpi_alimentacao       { return 301 /kpi_alimentacao.html; }
    location = /kpi_receita_despesa   { return 301 /kpi_receita_despesa.html; }
    location = /kpi_v2                { return 301 /kpi_v2.html; }
    location = /kpi_vagas             { return 301 /kpi_vagas.html; }
    location = /kpi_vendas            { return 301 /kpi_vendas.html; }
    location = /kpi_consultas_status  { return 301 /kpi_consultas_status.html; }

    ##################################################
    # Compatibilidade com nomes antigos
    ##################################################

    location = /home.html        { return 301 /kpi_home.html; }
    location = /clientes.html    { return 301 /kpi_clientes.html; }
    location = /governo.html     { return 301 /kpi_governo.html; }
    location = /liberty.html     { return 301 /kpi_liberty.html; }
    location = /medicos.html     { return 301 /kpi_medicos.html; }
    location = /alimentacao      { return 301 /kpi_alimentacao.html; }
    location = /alimentacao.html { return 301 /kpi_alimentacao.html; }
    location = /receita_despesa.html { return 301 /kpi_receita_despesa.html; }
    location = /v2.html          { return 301 /kpi_v2.html; }
    location = /vagas.html       { return 301 /kpi_vagas.html; }
    location = /vendas.html      { return 301 /kpi_vendas.html; }
    location = /prescricao.html  { return 301 /KPI_prescricao.html; }
    location = /kpi_prescricao          { return 301 /KPI_prescricao.html; }
    location = /kpi_prescricao.html     { return 301 /KPI_prescricao.html; }

    # (removido 2026-04-18) kpi_prescricao_aberta — não existe mais.
    # (removido 2026-04-18) /json_prescricao/ — não existe mais.

    ##################################################
    # JSONs de dados — TODOS protegidos por auth
    # ----------------------------------------------------------------
    # Humano: cookie de sessão válido → 204 em /auth → serve arquivo.
    # Manus: header X-Manus-Key válido → 204 em /auth → serve arquivo.
    # Sem credencial: redireciona para /login (humano) ou 401 (API).
    ##################################################

    location ^~ /json_consolidado/ {
        auth_request /auth;
        error_page 401 =302 /login;
        try_files $uri =404;
    }

    location ^~ /json_consultas_mensal/ {
        auth_request /auth;
        error_page 401 =302 /login;
        try_files $uri =404;
    }

    location ^~ /json_metas/ {
        auth_request /auth;
        error_page 401 =302 /login;
        try_files $uri =404;
    }

    location ^~ /json_notas_rps/ {
        auth_request /auth;
        error_page 401 =302 /login;
        try_files $uri =404;
    }

    location ^~ /json_ctrlq_relatorio/ {
        auth_request /auth;
        error_page 401 =302 /login;
        try_files $uri =404;
    }

    location ^~ /json_ctrlq_desbloqueio/ {
        auth_request /auth;
        error_page 401 =302 /login;
        try_files $uri =404;
    }

    location ^~ /json_rateio/ {
        auth_request /auth;
        error_page 401 =302 /login;
        try_files $uri =404;
    }

    location ^~ /json_cadastro/ {
        auth_request /auth;
        error_page 401 =302 /login;
        try_files $uri =404;
    }

    location ^~ /json_vendas/ {
        auth_request /auth;
        error_page 401 =302 /login;
        try_files $uri =404;
    }

    location ^~ /json_fin_full/ {
        auth_request /auth;
        error_page 401 =302 /login;
        try_files $uri =404;
    }

    location ^~ /dados_vendas/ {
        auth_request /auth;
        error_page 401 =302 /login;
        try_files $uri =404;
    }

    location ^~ /sql_vendas/ {
        auth_request /auth;
        error_page 401 =302 /login;
        try_files $uri =404;
    }

    location ^~ /SQL_cadastro/ {
        auth_request /auth;
        error_page 401 =302 /login;
        try_files $uri =404;
    }

    location ^~ /export_harvest/ {
        auth_request /auth;
        error_page 401 =302 /login;
        try_files $uri =404;
    }

    location ^~ /export_trello/ {
        auth_request /auth;
        error_page 401 =302 /login;
        try_files $uri =404;
    }

    # ACL de postos (raiz) — vai pelo Flask, que filtra pelo usuário logado
    location = /postos_acl.json {
        proxy_pass http://127.0.0.1:8020$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
    }

    ##################################################
    # APIs — protegidas por auth_request
    # Devolvem 401 puro (sem redirect) quando não autenticado — útil para Manus.
    ##################################################

    location ^~ /api/receita_despesa/ {
        auth_request /auth;
        proxy_pass http://127.0.0.1:8020$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Manus-Key $http_x_manus_key;
    }

    location ^~ /api/kpis/ {
        auth_request /auth;
        proxy_pass http://127.0.0.1:8020$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Manus-Key $http_x_manus_key;
    }

    # Catch-all das outras /api/ — também exige auth.
    location ^~ /api/ {
        auth_request /auth;
        proxy_pass http://127.0.0.1:8020$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Manus-Key $http_x_manus_key;
    }

    ##################################################
    # HTML → SEMPRE Flask + Auth
    ##################################################

    location ~* \.html$ {
        auth_request /auth;
        error_page 401 =302 /login;
        proxy_pass http://127.0.0.1:8020$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
    }

    ##################################################
    # Página inicial
    ##################################################

    location = / {
        auth_request /auth;
        error_page 401 =302 /login;
        return 302 /kpi_home.html;
    }

    ##################################################
    # Fallback → Flask com auth
    ##################################################

    location / {
        auth_request /auth;
        error_page 401 =302 /login;
        proxy_pass http://127.0.0.1:8020$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
    }
}
