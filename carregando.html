<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Carregamento</title>
    <style>
        /* Estilo para o corpo da página, apenas para centralizar o spinner */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        /* O container do spinner */
        .loader {
            border: 8px solid #f3f3f3;
            /* Cor base do círculo (cinza claro) */
            border-top: 8px solid #3498db;
            /* Cor da parte que gira (azul) */
            border-radius: 50%;
            /* Transforma o elemento em um círculo */
            width: 60px;
            height: 60px;
            /* Aplica a animação de rotação */
            animation: spin 1s linear infinite;
        }

        /* A definição da animação */
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            /* Início da rotação */
            100% {
                transform: rotate(360deg);
            }

            /* Fim da rotação (uma volta completa) */
        }
    </style>
</head>

<body>
    <!-- O elemento que será animado -->
    <div class="loader"></div>
</body>

</html>
