name: Deploy to VM
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions: { contents: read }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug repo tree
        run: |
          set -euxo pipefail
          pwd
          git ls-files | head -n 200 || true

      - name: Setup SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_KEY_B64: ${{ secrets.SSH_KEY_B64 }}
        run: |
          set -euxo pipefail
          if [ -z "${SSH_KEY_B64:-}" ]; then
            echo "FALHA: secret SSH_KEY_B64 não definido"; exit 1
          fi
          install -m 600 -D /dev/null ~/.ssh/id_vm
          echo "$SSH_KEY_B64" | base64 -d | tr -d '\r' > ~/.ssh/id_vm
          chmod 600 ~/.ssh/id_vm
          head -n1 ~/.ssh/id_vm; tail -n1 ~/.ssh/id_vm
          ssh-keyscan -p "${SSH_PORT:-22}" "$SSH_HOST" >> ~/.ssh/known_hosts

      # COPIA SOMENTE assets web específicos para /var/www
      - name: WEB (js,css,fonts,images) -> /var/www
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euxo pipefail
          DEST=/var/www
          ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEST'"
          for d in js css fonts images; do
            if [ -d "$d" ]; then
              ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEST/$d'"
              rsync -avz --delete -e "ssh -i ~/.ssh/id_vm -p ${SSH_PORT:-22}" \
                "./$d/" "$SSH_USER@$SSH_HOST:$DEST/$d/"
            fi
          done

      - name: analyze_groq.py -> /opt/ia-groq e /opt/ia-groq/app
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euxo pipefail
          ANALYZE_PATH="$(git ls-files | grep -E '(^|/)+analyze_groq\.py$' | head -n1 || true)"
          if [ -z "$ANALYZE_PATH" ]; then
            echo "WARN: analyze_groq.py não encontrado; pulando step."
            exit 0
          fi
          for d in /opt/ia-groq /opt/ia-groq/app; do
            ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$d'"
            rsync -avz -e "ssh -i ~/.ssh/id_vm -p ${SSH_PORT:-22}" \
              "$ANALYZE_PATH" "$SSH_USER@$SSH_HOST:$d/"
          done

      # LIMPA eventuais pastas web antigas e envia SOMENTE *.py para /opt/relatorio_h_t
      - name: *.py -> /opt/relatorio_h_t (somente arquivos)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euxo pipefail
          DEST=/opt/relatorio_h_t
          ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "\
            mkdir -p '$DEST' && rm -rf '$DEST/js' '$DEST/css' '$DEST/fonts' '$DEST/images' || true"

          # lista somente .py, exclui analyze_groq.py
          PY_LIST="$(git ls-files '*.py' | grep -v -E '(^|/)analyze_groq\.py$' || true)"
          if [ -z "$PY_LIST" ]; then
            echo 'WARN: nenhum .py para enviar'; exit 0
          fi

          # envia apenas os arquivos listados, preservando estrutura de pastas necessária
          printf '%s\n' "$PY_LIST" | rsync -avz --relative -e "ssh -i ~/.ssh/id_vm -p ${SSH_PORT:-22}" \
            --files-from=- . "$SSH_USER@$SSH_HOST:$DEST/"
