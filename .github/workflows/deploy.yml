name: Deploy to VM
on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions: { contents: read }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug repo tree
        run: |
          set -euxo pipefail
          pwd
          git ls-files | head -n 200 || true

      - name: Debug sql no checkout
        run: |
          set -euxo pipefail
          echo "Arquivos rastreados em sql/:"
          git ls-files 'sql/**' || true
          echo "Listagem local:"
          ls -la sql || true
          find sql -maxdepth 1 -type f -printf "%P\n" || true

      - name: Setup SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_KEY_B64: ${{ secrets.SSH_KEY_B64 }}
        run: |
          set -euxo pipefail
          [ -n "${SSH_KEY_B64:-}" ] || { echo "FALHA: SSH_KEY_B64"; exit 1; }
          install -m 600 -D /dev/null ~/.ssh/id_vm
          echo "$SSH_KEY_B64" | base64 -d | tr -d '\r' > ~/.ssh/id_vm
          chmod 600 ~/.ssh/id_vm
          ssh-keyscan -p "${SSH_PORT:-22}" "$SSH_HOST" >> ~/.ssh/known_hosts

      # 1) Assets web -> /var/www
      - name: WEB (js,css,fonts,images) -> /var/www
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}   # use 'deploy'
        run: |
          set -euxo pipefail
          DEST=/var/www
          ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEST'"
          for d in js css fonts images; do
            if [ -d "$d" ]; then
              ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEST/$d'"
              rsync -rlvz --delete \
                --omit-dir-times --no-perms --no-owner --no-group \
                -e "ssh -i ~/.ssh/id_vm -p ${SSH_PORT:-22}" \
                "./$d/" "$SSH_USER@$SSH_HOST:$DEST/$d/"
            fi
          done

      # 1.1) HTMLs na raiz do repo -> /var/www
      - name: HTML raiz -> /var/www
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euxo pipefail
          DEST=/var/www
          ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEST'"
          # Copia apenas *.html da raiz do projeto, sem deletar outros assets já publicados
          rsync -rlvz \
            --omit-dir-times --no-perms --no-owner --no-group \
            -e "ssh -i ~/.ssh/id_vm -p ${SSH_PORT:-22}" \
            --include='*.html' --exclude='*' \
            ./ "$SSH_USER@$SSH_HOST:$DEST/"

      # 2) analyze_groq.py -> /opt/ia-groq e /opt/ia-groq/app
      - name: analyze_groq.py -> /opt/ia-groq e /opt/ia-groq/app
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euxo pipefail
          ANALYZE_PATH="$(git ls-files | grep -E '(^|/)+analyze_groq\.py$' | head -n1 || true)"
          if [ -z "$ANALYZE_PATH" ]; then
            echo "WARN: analyze_groq.py não encontrado; pulando step."
            exit 0
          fi
          for d in /opt/ia-groq /opt/ia-groq/app; do
            ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$d'"
            rsync -rlvz \
              --omit-dir-times --no-perms --no-owner --no-group \
              -e "ssh -i ~/.ssh/id_vm -p ${SSH_PORT:-22}" \
              "$ANALYZE_PATH" "$SSH_USER@$SSH_HOST:$d/"
          done

      # 3) Código .py + requirements* -> /opt/relatorio_h_t
      - name: Código + requirements -> /opt/relatorio_h_t
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euxo pipefail
          DEST=/opt/relatorio_h_t
          ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "\
            mkdir -p '$DEST' && rm -rf '$DEST/js' '$DEST/css' '$DEST/fonts' '$DEST/images' '$DEST/public' '$DEST/prompt' || true"
          rsync -rlvz --prune-empty-dirs \
            --omit-dir-times --no-perms --no-owner --no-group \
            -e "ssh -i ~/.ssh/id_vm -p ${SSH_PORT:-22}" \
            --include='*/' \
            --include='*.py' \
            --include='requirements*.txt' \
            --exclude='analyze_groq.py' \
            --exclude='/css/***' --exclude='/fonts/***' --exclude='/images/***' \
            --exclude='/js/***'  --exclude='/public/***' --exclude='/prompt/***' \
            --exclude='*' \
            ./ "$SSH_USER@$SSH_HOST:$DEST/"

      # 3.1) postos_acl.json -> /opt/relatorio_h_t
      - name: postos_acl.json -> /opt/relatorio_h_t
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euxo pipefail
          DEST=/opt/relatorio_h_t
          FILE="postos_acl.json"
              
          if [ -f "$FILE" ]; then
           ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" \
              "mkdir -p '$DEST'"
            rsync -rlvz \
              --omit-dir-times --no-perms --no-owner --no-group \
              -e "ssh -i ~/.ssh/id_vm -p ${SSH_PORT:-22}" \
              "$FILE" "$SSH_USER@$SSH_HOST:$DEST/"
          else
            echo "WARN: postos_acl.json não encontrado no repo"
          fi
      


      # 3.2) app.py -> /opt/camim-auth
      - name: app.py -> /opt/camim-auth
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euxo pipefail
          DEST=/opt/camim-auth
          FILE="app.py"

          if [ -f "$FILE" ]; then
            ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" \
              "mkdir -p '$DEST'"
            rsync -rlvz \
              --omit-dir-times --no-perms --no-owner --no-group \
              -e "ssh -i ~/.ssh/id_vm -p ${SSH_PORT:-22}" \
              "$FILE" "$SSH_USER@$SSH_HOST:$DEST/"
          else
            echo "WARN: app.py não encontrado no repo"
          fi

          # Reinicia backend de auth automaticamente
          ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" \
            "sudo systemctl restart camim-auth || true"




      # 4) Sync dedicado do diretório sql/
      - name: Sync sql -> /opt/relatorio_h_t/sql
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euxo pipefail
          DEST=/opt/relatorio_h_t/sql
          if [ -d sql ]; then
            ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEST'"
            rsync -rlvz --delete \
              --omit-dir-times --no-perms --no-owner --no-group \
              -e "ssh -i ~/.ssh/id_vm -p ${SSH_PORT:-22}" \
              ./sql/ "$SSH_USER@$SSH_HOST:$DEST/"
          else
            echo "WARN: diretório sql não existe no checkout"
          fi
          ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "ln -sfn /opt/relatorio_h_t/sql /opt/relatorio_h_t/SQL || true"

      # 5) Venv + deps + .env (sem sudo)
      - name: Venv + deps + .env
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          ENV_FILE_B64: ${{ secrets.ENV_FILE_B64 }}
        run: |
          set -euxo pipefail
          DEST=/opt/relatorio_h_t
          ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "\
            set -euxo pipefail; cd '$DEST'; \
            python3 -m venv .venv || true; \
            source .venv/bin/activate; \
            python -m pip install --upgrade pip setuptools wheel; \
            if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi; \
            if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi"
          if [ -n "${ENV_FILE_B64:-}" ]; then
            ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "install -m 600 -D /dev/null '$DEST/.env'"
            echo "$ENV_FILE_B64" | base64 -d | tr -d '\r' | \
              ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "cat > '$DEST/.env'"
          fi

      # 6) Sanidade
      - name: Sanidade na VM
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euxo pipefail
          ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "\
            ls -la /opt/relatorio_h_t/sql || true; \
            test -d /opt/relatorio_h_t/SQL && echo 'Symlink SQL presente' || echo 'Sem symlink SQL'; \
            . /opt/relatorio_h_t/.venv/bin/activate; python -V; pip -V"
