name: Deploy to VM

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_KEY:  ${{ secrets.SSH_KEY }}
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_vm
          printf "%s" "$SSH_KEY" > ~/.ssh/id_vm
          ssh-keyscan -p "${SSH_PORT:-22}" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy WEB -> /var/www
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          DEST=/var/www
          ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEST'"
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_vm -p ${SSH_PORT:-22}" \
            --exclude='*.py' \
            --exclude='.git/' --exclude='.github/' \
            ./ "$SSH_USER@$SSH_HOST:$DEST/"

      - name: Deploy analyze_groq.py para /opt/ia-groq e /opt/ia-groq/app
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          for d in /opt/ia-groq /opt/ia-groq/app; do
            ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$d'"
            rsync -avz -e "ssh -i ~/.ssh/id_vm -p ${SSH_PORT:-22}" \
              "analyze_groq.py" "$SSH_USER@$SSH_HOST:$d/"
          done

      - name: Deploy demais .py -> /opt/relatorio_h_t
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          DEST=/opt/relatorio_h_t
          ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEST'"
          # só .py, exceto analyze_groq.py
          rsync -avz \
            -e "ssh -i ~/.ssh/id_vm -p ${SSH_PORT:-22}" \
            --include='*/' --include='*.py' --exclude='analyze_groq.py' --exclude='*' \
            ./ "$SSH_USER@$SSH_HOST:$DEST/"
