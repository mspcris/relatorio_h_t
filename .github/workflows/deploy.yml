name: Deploy to VM

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug repo tree
        run: |
          set -euxo pipefail
          pwd
          git ls-files | head -n 200 || true

      - name: Debug sql no checkout
        run: |
          set -euxo pipefail
          echo "Arquivos rastreados em sql/:"
          git ls-files 'sql/**' || true
          echo "Listagem local:"
          ls -la sql || true
          find sql -maxdepth 1 -type f -printf "%P\n" || true

      # ================================================================
      # 0) Setup SSH
      # ================================================================
      - name: Setup SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_KEY_B64: ${{ secrets.SSH_KEY_B64 }}
        run: |
          set -euxo pipefail
          install -m 600 -D /dev/null ~/.ssh/id_vm
          echo "$SSH_KEY_B64" | base64 -d | tr -d '\r' > ~/.ssh/id_vm
          chmod 600 ~/.ssh/id_vm
          ssh-keyscan -p "${SSH_PORT:-22}" "$SSH_HOST" >> ~/.ssh/known_hosts

      # ================================================================
      # 1) ASSETS ESTÁTICOS → /var/www
      # ================================================================
      - name: WEB (js,css,fonts,images) -> /var/www
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euxo pipefail
          DEST=/var/www
          ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEST'"
          for d in js css fonts images; do
            if [ -d "$d" ]; then
              ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEST/$d'"
              rsync -rlvz --delete \
                --omit-dir-times --no-perms --no-owner --no-group \
                -e "ssh -i ~/.ssh/id_vm -p ${SSH_PORT:-22}" \
                "./$d/" "$SSH_USER@$SSH_HOST:$DEST/$d/"
            fi
          done

      - name: postos_acl.json -> /var/www
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euxo pipefail
          FILE="postos_acl.json"
          DEST=/var/www
          if [ -f "$FILE" ]; then
            ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEST'"
            rsync -rlvz --delete \
              --omit-dir-times --no-perms --no-owner --no-group \
              -e "ssh -i ~/.ssh/id_vm -p ${SSH_PORT:-22}" \
              "$FILE" "$SSH_USER@$SSH_HOST:$DEST/"
          else
            echo "WARN: postos_acl.json não encontrado"
          fi

      # ================================================================
      # 2) HTML templates → /opt/camim-auth/templates
      # ================================================================
      - name: HTML templates -> /opt/camim-auth/templates
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euxo pipefail
          DEST=/opt/camim-auth/templates
          ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEST'"
          rsync -rlvz --delete \
            --include='*/' \
            --include='*.html' \
            --exclude='*' \
            --omit-dir-times --no-perms --no-owner --no-group \
            -e "ssh -i ~/.ssh/id_vm -p ${SSH_PORT:-22}" \
            ./ "$SSH_USER@$SSH_HOST:$DEST/"

      # ================================================================
      # 2B) login.html -> /var/www  (nginx serve direto; sync_www também faz isso,
      #     mas o deploy garante atualização imediata sem depender do cron)
      # ================================================================
      - name: login.html -> /var/www
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euxo pipefail
          rsync -lvz \
            --omit-dir-times --no-perms --no-owner --no-group \
            -e "ssh -i ~/.ssh/id_vm -p ${SSH_PORT:-22}" \
            ./login.html "$SSH_USER@$SSH_HOST:/var/www/login.html"

      # ================================================================
      # 3) analyze_groq.py
      # ================================================================
      - name: analyze_groq.py -> /opt/ia-groq e /opt/ia-groq/app
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euxo pipefail
          ANALYZE_PATH="$(git ls-files | grep -E '(^|/)+analyze_groq\.py$' | head -n1 || true)"

          if [ -z "$ANALYZE_PATH" ]; then
            echo "WARN: analyze_groq.py não encontrado"
            exit 0
          fi

          for d in /opt/ia-groq /opt/ia-groq/app; do
            ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$d'"
            rsync -rlvz --delete \
              --omit-dir-times --no-perms --no-owner --no-group \
              -e "ssh -i ~/.ssh/id_vm -p ${SSH_PORT:-22}" \
              "$ANALYZE_PATH" "$SSH_USER@$SSH_HOST:$d/"
          done

      # ================================================================
      # 3B) IA modules -> /opt/ia-groq
      # ================================================================
      - name: IA modules -> /opt/ia-groq
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euxo pipefail

          DEST=/opt/ia-groq
          ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEST'"

          IA_FILES=(
            "orquestrador.py"
            "ia_router.py"
            "llm_client.py"
            "formatter_html_universal.py"
            "sanitizer_texto_universal.py"
            "summarizer_universal.py"
            "extractor_resposta_objetiva.py"
          )

          for f in "${IA_FILES[@]}"; do
            if [ -f "$f" ]; then
              echo "Copiando $f → $DEST"
              rsync -rlvz --delete \
                --omit-dir-times --no-perms --no-owner --no-group \
                -e "ssh -i ~/.ssh/id_vm -p ${SSH_PORT:-22}" \
                "$f" "$SSH_USER@$SSH_HOST:$DEST/"
            else
              echo "WARN: arquivo $f não encontrado no repositório"
            fi
          done

      # ================================================================
      # 3C) COPIAR PROMPTS → /opt/ia-groq/prompt
      # ================================================================
      - name: Copiar prompts -> /opt/ia-groq/prompt
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euxo pipefail
          DEST=/opt/ia-groq/prompt
          ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEST'"

          rsync -rlvz --delete \
            --include='*/' \
            --include='*.txt' \
            --exclude='*' \
            --omit-dir-times --no-perms --no-owner --no-group \
            -e "ssh -i ~/.ssh/id_vm -p ${SSH_PORT:-22}" \
            "./prompt/" "$SSH_USER@$SSH_HOST:$DEST/"

      # ================================================================
      # 4) Código Python → /opt/relatorio_h_t
      # ================================================================
      - name: Código + requirements -> /opt/relatorio_h_t
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euxo pipefail
          DEST=/opt/relatorio_h_t
          ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEST'"
          rsync -rlvz --prune-empty-dirs \
            --omit-dir-times --no-perms --no-owner --no-group \
            -e "ssh -i ~/.ssh/id_vm -p ${SSH_PORT:-22}" \
            --include='*/' \
            --include='*.py' \
            --include='requirements*.txt' \
            --exclude='analyze_groq.py' \
            --exclude='/css/***' \
            --exclude='/fonts/***' \
            --exclude='/images/***' \
            --exclude='/js/***' \
            --exclude='/public/***' \
            --exclude='/prompt/***' \
            --exclude='*' \
            ./ "$SSH_USER@$SSH_HOST:$DEST/"

      - name: postos_acl.json -> /opt/relatorio_h_t
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euxo pipefail
          DEST=/opt/relatorio_h_t
          FILE="postos_acl.json"
          if [ -f "$FILE" ]; then
            ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEST'"
            rsync -rlvz --delete \
              --omit-dir-times --no-perms --no-owner --no-group \
              -e "ssh -i ~/.ssh/id_vm -p ${SSH_PORT:-22}" \
              "$FILE" "$SSH_USER@$SSH_HOST:$DEST/"
          fi

      # ================================================================
      # 5) app.py + módulos Python → /opt/camim-auth
      # ================================================================
      - name: app.py + modules -> /opt/camim-auth
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euxo pipefail
          DEST=/opt/camim-auth
          ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEST'"
          for f in app.py auth_db.py auth_routes.py migrate_usuarios.py ia_router_openai.py llm_client_openai.py llm_client_anthropic.py llm_client.py; do
            if [ -f "$f" ]; then
              echo "Copiando $f → $DEST"
              rsync -rlvz \
                --omit-dir-times --no-perms --no-owner --no-group \
                -e "ssh -i ~/.ssh/id_vm -p ${SSH_PORT:-22}" \
                "$f" "$SSH_USER@$SSH_HOST:$DEST/"
            else
              echo "WARN: $f não encontrado"
            fi
          done

      # ================================================================
      # 5B) Deps novas no venv de /opt/camim-auth
      # ================================================================
      - name: pip install werkzeug no venv camim-auth
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "
            VENV=/opt/camim-auth/venv
            if [ -d \"\$VENV\" ]; then
              \$VENV/bin/pip install --quiet werkzeug sqlalchemy requests itsdangerous flask openai anthropic groq
            else
              echo 'WARN: venv em /opt/camim-auth/venv nao encontrado'
            fi
          "

      # ================================================================
      # 6) Sync SQL (todas as pastas que começam com sql*)
      # ================================================================
      - name: Sync sql* -> /opt/relatorio_h_t
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euxo pipefail
          DEST=/opt/relatorio_h_t

          # pega diretórios no root do repo que começam com "sql"
          mapfile -t SQL_DIRS < <(find . -maxdepth 1 -type d -name 'sql*' -printf '%f\n' | sort)

          if [ "${#SQL_DIRS[@]}" -eq 0 ]; then
            echo "WARN: nenhuma pasta sql* encontrada no checkout"
            exit 0
          fi

          echo "Pastas encontradas: ${SQL_DIRS[*]}"

          for d in "${SQL_DIRS[@]}"; do
            echo "Sync pasta: $d"
            ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEST/$d'"
            rsync -rlvz --delete \
              --omit-dir-times --no-perms --no-owner --no-group \
              -e "ssh -i ~/.ssh/id_vm -p ${SSH_PORT:-22}" \
              "./$d/" "$SSH_USER@$SSH_HOST:$DEST/$d/"
          done

          # Mantém compatibilidade com caminhos antigos (se você usa /SQL em algum lugar)
          ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" \
            "ln -sfn /opt/relatorio_h_t/sql /opt/relatorio_h_t/SQL || true"


      # ================================================================
      # 7) Venv + .env
      # ================================================================
      - name: Venv + deps + .env
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          ENV_FILE_B64: ${{ secrets.ENV_FILE_B64 }}
        run: |
          set -euxo pipefail
          DEST=/opt/relatorio_h_t

          ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" << 'EOF'
            set -euxo pipefail
            cd /opt/relatorio_h_t

            python3 -m venv .venv || true
            . .venv/bin/activate

            python -m pip install --upgrade pip setuptools wheel

            if [ -f requirements.txt ]; then
              python -m pip install -r requirements.txt
            fi

            if [ -f requirements-dev.txt ]; then
              python -m pip install -r requirements-dev.txt
            fi
          EOF

          if [ -n "${ENV_FILE_B64:-}" ]; then
            ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "install -m 600 -D /dev/null '$DEST/.env'"
            echo "$ENV_FILE_B64" | base64 -d | tr -d '\r' \
              | ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "cat > '$DEST/.env'"
          fi

      # ================================================================
      # 8) Sanidade final
      # ================================================================
      - name: Sanidade na VM
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "
            ls -la /opt/relatorio_h_t/sql || true
            test -d /opt/relatorio_h_t/SQL && echo 'Symlink SQL presente' || echo 'Sem symlink SQL'
            . /opt/relatorio_h_t/.venv/bin/activate
            python -V
            pip -V
          "

      # ================================================================
      # 9) Restart FINAL (camim-auth + nginx)
      # ================================================================
      - name: Restart camim-auth + nginx
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "
            echo 'Reiniciando camim-auth.service e nginx...'
            sudo systemctl restart camim-auth.service
            sudo systemctl restart nginx
            sudo systemctl status camim-auth.service --no-pager || true
          "

      # ================================================================
      # 10) Restart IA-Groq service
      # ================================================================
      - name: Restart IA service
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "
            echo 'Reiniciando ia-groq.service...'
            sudo systemctl restart ia-groq.service
            sudo systemctl status ia-groq.service --no-pager || true
          "
