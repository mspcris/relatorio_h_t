name: Deploy to VM
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions: { contents: read }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug repo tree
        run: |
          set -euxo pipefail
          pwd
          git ls-files | head -n 200 || true

      - name: Setup SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_KEY_B64: ${{ secrets.SSH_KEY_B64 }}
        run: |
          set -euxo pipefail
          if [ -z "${SSH_KEY_B64:-}" ]; then
            echo "FALHA: secret SSH_KEY_B64 não definido"; exit 1
          fi
          install -m 600 -D /dev/null ~/.ssh/id_vm
          echo "$SSH_KEY_B64" | base64 -d | tr -d '\r' > ~/.ssh/id_vm
          chmod 600 ~/.ssh/id_vm
          head -n1 ~/.ssh/id_vm; tail -n1 ~/.ssh/id_vm
          ssh-keyscan -p "${SSH_PORT:-22}" "$SSH_HOST" >> ~/.ssh/known_hosts

      # 1) Só assets web -> /var/www
      - name: WEB (js,css,fonts,images) -> /var/www
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euxo pipefail
          DEST=/var/www
          ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEST'"
          for d in js css fonts images; do
            if [ -d "$d" ]; then
              ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEST/$d'"
              rsync -avz --delete -e "ssh -i ~/.ssh/id_vm -p ${SSH_PORT:-22}" \
                "./$d/" "$SSH_USER@$SSH_HOST:$DEST/$d/"
            fi
          done

      # 2) analyze_groq.py -> /opt/ia-groq e /opt/ia-groq/app
      - name: analyze_groq.py -> /opt/ia-groq e /opt/ia-groq/app
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euxo pipefail
          ANALYZE_PATH="$(git ls-files | grep -E '(^|/)+analyze_groq\.py$' | head -n1 || true)"
          if [ -z "$ANALYZE_PATH" ]; then
            echo "WARN: analyze_groq.py não encontrado; pulando step."
            exit 0
          fi
          for d in /opt/ia-groq /opt/ia-groq/app; do
            ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$d'"
            rsync -avz -e "ssh -i ~/.ssh/id_vm -p ${SSH_PORT:-22}" \
              "$ANALYZE_PATH" "$SSH_USER@$SSH_HOST:$d/"
          done

      # 3) Somente .py (exceto analyze_groq.py) + sql/** + requirements* -> /opt/relatorio_h_t
      - name: Código + sql + requirements -> /opt/relatorio_h_t
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          ENV_FILE_B64: ${{ secrets.ENV_FILE_B64 }}   # base64 do conteúdo do .env
        run: |
          set -euxo pipefail
          DEST=/opt/relatorio_h_t

          # garante destino e remove sobras web
          ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "\
            mkdir -p '$DEST' && rm -rf '$DEST/js' '$DEST/css' '$DEST/fonts' '$DEST/images' '$DEST/public' '$DEST/prompt' || true"

          # sincroniza apenas .py, sql/** e requirements*
          rsync -avz -m --relative -e "ssh -i ~/.ssh/id_vm -p ${SSH_PORT:-22}" \
            --include='*/' \
            --include='sql/***' \
            --include='*.py' \
            --include='requirements*.txt' \
            --exclude='analyze_groq.py' \
            --exclude='/css/***' --exclude='/fonts/***' --exclude='/images/***' \
            --exclude='/js/***'  --exclude='/public/***' --exclude='/prompt/***' \
            --exclude='*' \
            ./ "$SSH_USER@$SSH_HOST:$DEST/"

          # venv e deps
          ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "\
            set -euxo pipefail; cd '$DEST'; \
            python3 -m venv .venv || true; \
            source .venv/bin/activate; \
            python -m pip install --upgrade pip setuptools wheel; \
            if ls requirements*.txt >/dev/null 2>&1; then \
              (python -m pip install -r requirements.txt) || \
              (python -m pip install -r requirements-dev.txt); \
            fi"

          # provisiona .env a partir do secret base64
          if [ -n "${ENV_FILE_B64:-}" ]; then
            ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "\
              install -m 600 -D /dev/null '$DEST/.env'"
            echo "$ENV_FILE_B64" | base64 -d | tr -d '\r' | \
              ssh -i ~/.ssh/id_vm -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "cat > '$DEST/.env'"
          fi
