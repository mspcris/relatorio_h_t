<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <title>CAMIM — Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- CSS base jį usado no projeto -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/style2.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.4/css/all.min.css">

    <style>
        /* Layout responsivo: centro perfeito em qualquer tela */
        body,
        html {
            height: 100%;
        }

        .login-wrap {
            min-height: 100svh;
            display: grid;
            place-items: center;
            padding: 24px;
            /* fundo suave; troque por imagem se quiser */
            background:
                radial-gradient(1200px 600px at 10% 10%, rgba(255, 255, 255, .08), transparent 60%),
                radial-gradient(1000px 600px at 90% 90%, rgba(255, 255, 255, .06), transparent 60%),
                linear-gradient(135deg, #e6eef5 0%, #dfe7ef 40%, #d5e0ea 100%);
        }

        /* Cartćo com vidro fosco (consistente com o efeito do menu/preload) */
        .glass-card {
            width: min(420px, 92vw);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, .35);
            background: rgba(255, 255, 255, .40);
            box-shadow:
                0 10px 30px rgba(31, 49, 71, .18),
                inset 0 0 0 1px rgba(255, 255, 255, .25);
            /* vidro */
            -webkit-backdrop-filter: blur(16px) saturate(1.2);
            backdrop-filter: blur(16px) saturate(1.2);
        }

        /* fallback quando nćo houver suporte ao backdrop-filter */
        @supports not ((-webkit-backdrop-filter: blur(16px)) or (backdrop-filter: blur(16px))) {
            .glass-card {
                background: rgba(255, 255, 255, .85);
            }
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .brand img {
            height: 42px;
            width: auto;
        }

        .brand-title {
            font-weight: 700;
            white-space: nowrap;
        }

        .muted {
            color: #6b7280;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .btn-primary {
            background: #2f6bb6;
            border-color: #25599a;
        }

        .btn-primary:hover {
            filter: brightness(.98);
        }

        /* Acessibilidade e toque */
        .form-control {
            height: 42px;
        }

        .input-group-text {
            width: 42px;
            justify-content: center;
        }

        /* Links auxiliares empilhados no mobile */
        .helpers {
            display: flex;
            gap: 10px;
            justify-content: space-between;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>

    <script>document.documentElement.classList.add('loaded');</script>


    <div class="login-wrap">
        <div class="glass-card">
            <div class="brand">
                <img src="../images/Logo Camim-01_50px.png" alt="Logo CAMIM">
                <div class="brand-title">Quem tem saśde é mais feliz!</div>
            </div>
            <div class="muted mb-3">Acesse sua conta para continuar.</div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="email" class="small mb-1">E-mail</label>
                    <div class="input-group">
                        <div class="input-group-prepend"><span class="input-group-text"><i
                                    class="far fa-envelope"></i></span></div>
                        <input id="email" name="email" type="email" class="form-control" placeholder="voce@empresa.com"
                            required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="senha" class="small mb-1">Senha</label>
                    <div class="input-group">
                        <div class="input-group-prepend"><span class="input-group-text"><i
                                    class="fas fa-lock"></i></span></div>
                        <input id="senha" name="senha" type="password" class="form-control" placeholder="••••••••"
                            minlength="4" required>
                        <div class="input-group-append">
                            <button class="btn btn-outline-secondary" type="button" id="togglePwd"
                                aria-label="Mostrar/ocultar senha"><i class="far fa-eye"></i></button>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block mt-2">Entrar</button>

                <div class="helpers mt-3">
                    <a href="#" class="small">Esqueci minha senha</a>
                    <a href="#" class="small">Criar conta</a>
                </div>
            </form>

            <div id="msg" class="text-danger small mt-2" role="alert" style="min-height:18px"></div>
        </div>
    </div>

    <!-- JS -->
    <script>
        // Mostrar/ocultar senha
        document.getElementById('togglePwd').addEventListener('click', function () {
            const i = document.getElementById('senha');
            const eye = this.querySelector('i');
            const on = i.type === 'password';
            i.type = on ? 'text' : 'password';
            eye.classList.toggle('fa-eye', !on);
            eye.classList.toggle('fa-eye-slash', on);
        });

        // Validaēćo simples (substitua pela sua rota)
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;
            const msg = document.getElementById('msg');
            msg.textContent = '';

            if (!email || !senha) { msg.textContent = 'Preencha e-mail e senha.'; return; }

            try {
                // Exemplo: POST para sua API. Ajuste URL e payload.
                // const r = await fetch('/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email, senha }) });
                // if (!r.ok) throw new Error('Credenciais invįlidas');
                // location.href = '/templates/index.html';

                // Mock local:
                setTimeout(() => { window.location.href = 'index.html'; }, 300);
            } catch (err) {
                msg.textContent = err.message || 'Erro ao autenticar.';
            }
        });
    </script>
</body>

</html>
