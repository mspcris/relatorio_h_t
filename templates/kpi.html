<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <title>KPI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../node_modules/admin-lte/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="../node_modules/@fortawesome/fontawesome-free/css/all.min.css">
    <style>
        /* Layout principal em flex para empilhar blocos e ajustar alturas dinamicamente */
        .stack {
            display: flex;
            flex-direction: column;
            gap: 12px
        }

        /* 1) CARTÃO DE FILTROS: estilo isolado, sem altura fixa */
        .filter-card .card-body {
            padding: .75rem
        }

        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: .5rem 1rem;
            align-items: flex-end
        }

        .filter-row .form-control-sm {
            min-width: 150px
        }

        /* 2) CARTÕES DE GRÁFICO: altura fixa apenas para gráficos */
        .chart-card .card-body {
            height: 320px
        }

        @media (max-width:576px) {
            .chart-card .card-body {
                height: 260px
            }
        }

        /* Abas roláveis para mobile */
        .scroll-tabs {
            white-space: nowrap;
            overflow-x: auto
        }

        .scroll-tabs .nav-link {
            display: inline-block;
            min-width: 52px;
            text-align: center
        }

        /* Tabela responsiva: ocupa só o necessário; rolagem horizontal se precisar */
        .table-responsive {
            width: 100%
        }

        .text-right {
            text-align: right
        }
    </style>
</head>

<body class="hold-transition sidebar-mini">
    <div class="wrapper">
        <nav class="main-header navbar navbar-expand navbar-white navbar-light">
            <span class="ml-2 font-weight-bold">Relatório Consolidado</span>
        </nav>

        <div class="content-wrapper">
            <section class="content p-3 stack">
                <div id="err" class="text-danger mb-1"></div>

                <!-- FILTROS -->
                <div class="card filter-card">
                    <div class="card-body">
                        <div class="filter-row">
                            <div>
                                <label class="mb-0 small d-block">Período</label>
                                <div class="d-flex">
                                    <input id="from" type="month" class="form-control form-control-sm mr-1">
                                    <input id="to" type="month" class="form-control form-control-sm">
                                </div>
                            </div>
                            <div>
                                <label class="mb-0 small d-block">Posto (fallback)</label>
                                <select id="postoSel" class="form-control form-control-sm">
                                    <option value="ALL">Todos</option>
                                </select>
                            </div>
                            <button id="reset" class="btn btn-sm btn-outline-secondary">Reset</button>
                        </div>
                    </div>
                </div>

                <!-- TABELA -->
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Dados do Período Selecionado</h3>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-striped table-sm mb-0">
                                <thead>
                                    <tr>
                                        <th>Mês</th>
                                        <th class="text-right">Mensalidade</th>
                                        <th class="text-right">Médico</th>
                                        <th class="text-right">Alimentação</th>
                                        <th class="text-right">% Médico/Mens</th>
                                        <th class="text-right">% Aliment./Mens</th>
                                    </tr>
                                </thead>
                                <tbody id="tblBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- ABAS -->
                <ul id="postoTabs" class="nav nav-pills scroll-tabs"></ul>

                <!-- GRÁFICOS -->
                <div class="card chart-card">
                    <div class="card-header">
                        <h3 class="card-title">Evolução Mensal</h3>
                    </div>
                    <div class="card-body"><canvas id="chartValores"></canvas></div>
                </div>

                <div class="card chart-card">
                    <div class="card-header">
                        <h3 class="card-title">% Médico sobre Mensalidade</h3>
                    </div>
                    <div class="card-body"><canvas id="chartPercMed"></canvas></div>
                </div>

                <div class="card chart-card">
                    <div class="card-header">
                        <h3 class="card-title">% Alimentação sobre Mensalidade</h3>
                    </div>
                    <div class="card-body"><canvas id="chartPercAlim"></canvas></div>
                </div>
            </section>
        </div>
    </div>

    <script src="../node_modules/jquery/dist/jquery.min.js"></script>
    <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../node_modules/admin-lte/dist/js/adminlte.min.js"></script>
    <script src="../node_modules/chart.js/dist/chart.umd.js"></script>
    <script>
        const URL_GERAL = "../json_consolidado/consolidado_mensal.json";
        const URL_POR_POSTO = "../json_consolidado/consolidado_mensal_por_posto.json";

        const el = s => document.querySelector(s);
        const showErr = e => { console.error(e); el('#err').textContent = e?.message || e; };
        const fmtNum = new Intl.NumberFormat('pt-BR', { maximumFractionDigits: 0 });
        const fmtPct = v => v == null ? '—' : `${v.toFixed(2)}%`;

        let geral = {}, porPosto = {}, MESES = [], POSTOS = [];
        let chValores, chPercMed, chPercAlim;

        const monthSort = a => a.sort();
        const rangeFilter = (labels, from, to) => labels.filter(m => (!from || m >= from) && (!to || m <= to));

        function asArrayGeral(k, meses) { return meses.map(m => Number((geral[m] || {})[k] || 0)); }
        function asArrayPosto(k, meses, p) { return meses.map(m => Number((((porPosto[m] || {})[p]) || {})[k] || 0)); }
        function perc(vNum, vDen) { return vDen > 0 ? +(vNum / vDen * 100).toFixed(4) : null; }
        function percSeries(meses, p, key) {
            const num = asArrayPosto(key, meses, p);
            const den = asArrayPosto('mensalidade', meses, p);
            return num.map((v, i) => perc(v, den[i]));
        }

        function buildTabs() {
            const ul = el('#postoTabs'); ul.innerHTML = '';
            ul.insertAdjacentHTML('beforeend',
                `<li class="nav-item"><a data-posto="ALL" class="nav-link active" href="#">Todos</a></li>`);
            POSTOS.forEach(p => {
                ul.insertAdjacentHTML('beforeend', `<li class="nav-item"><a data-posto="${p}" class="nav-link" href="#">${p}</a></li>`);
                el('#postoSel').insertAdjacentHTML('beforeend', `<option value="${p}">${p}</option>`);
            });
            ul.addEventListener('click', e => {
                if (e.target.matches('.nav-link')) {
                    ul.querySelectorAll('.nav-link').forEach(a => a.classList.remove('active'));
                    e.target.classList.add('active');
                    el('#postoSel').value = e.target.dataset.posto;
                    render();
                }
            });
            el('#postoSel').addEventListener('change', () => {
                const p = el('#postoSel').value;
                ul.querySelectorAll('.nav-link').forEach(a => a.classList.toggle('active', a.dataset.posto === p));
                render();
            });
        }

        function initCharts() {
            chValores = new Chart(el('#chartValores'), {
                type: 'line',
                data: { labels: [], datasets: [] },
                options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, scales: { y: { beginAtZero: true } } }
            });
            chPercMed = new Chart(el('#chartPercMed'), {
                type: 'line',
                data: { labels: [], datasets: [{ label: '% Médico/Mensalidade', data: [], tension: .2 }] },
                options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, scales: { y: { ticks: { callback: v => v + '%' } } } }
            });
            chPercAlim = new Chart(el('#chartPercAlim'), {
                type: 'line',
                data: { labels: [], datasets: [{ label: '% Alimentação/Mensalidade', data: [], tension: .2 }] },
                options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, scales: { y: { ticks: { callback: v => v + '%' } } } }
            });
        }

        function buildTable(meses, pSel) {
            const tb = el('#tblBody'); tb.innerHTML = '';
            meses.forEach(m => {
                let mens, med, ali;
                if (pSel === 'ALL') {
                    const g = geral[m] || {};
                    mens = Number(g.mensalidade || 0);
                    med = Number(g.medico || 0);
                    ali = Number(g.alimentacao || 0);
                } else {
                    const g = ((porPosto[m] || {})[pSel]) || {};
                    mens = Number(g.mensalidade || 0);
                    med = Number(g.medico || 0);
                    ali = Number(g.alimentacao || 0);
                }
                const pMed = perc(med, mens);
                const pAli = perc(ali, mens);
                tb.insertAdjacentHTML('beforeend', `
      <tr>
        <td>${m}</td>
        <td class="text-right">${fmtNum.format(mens)}</td>
        <td class="text-right">${fmtNum.format(med)}</td>
        <td class="text-right">${fmtNum.format(ali)}</td>
        <td class="text-right">${fmtPct(pMed)}</td>
        <td class="text-right">${fmtPct(pAli)}</td>
      </tr>`);
            });
        }

        function render() {
            const from = el('#from').value || null;
            const to = el('#to').value || null;
            const pSel = el('#postoSel').value;
            const meses = rangeFilter(MESES, from, to);

            if (pSel === 'ALL') {
                chValores.data.labels = meses;
                chValores.data.datasets = [
                    { label: 'Mensalidade', data: asArrayGeral('mensalidade', meses), tension: .2 },
                    { label: 'Médico', data: asArrayGeral('medico', meses), tension: .2 },
                    { label: 'Alimentação', data: asArrayGeral('alimentacao', meses), tension: .2 },
                ];
                chPercMed.data.labels = meses;
                chPercMed.data.datasets[0].label = '% Médico/Mensalidade';
                chPercMed.data.datasets[0].data = meses.map(m => {
                    const g = geral[m] || {};
                    return perc(Number(g.medico || 0), Number(g.mensalidade || 0));
                });
                chPercAlim.data.labels = meses;
                chPercAlim.data.datasets[0].label = '% Alimentação/Mensalidade';
                chPercAlim.data.datasets[0].data = meses.map(m => {
                    const g = geral[m] || {};
                    return perc(Number(g.alimentacao || 0), Number(g.mensalidade || 0));
                });
            } else {
                chValores.data.labels = meses;
                chValores.data.datasets = [
                    { label: `Mensalidade (${pSel})`, data: asArrayPosto('mensalidade', meses, pSel), tension: .2 },
                    { label: `Médico (${pSel})`, data: asArrayPosto('medico', meses, pSel), tension: .2 },
                    { label: `Alimentação (${pSel})`, data: asArrayPosto('alimentacao', meses, pSel), tension: .2 },
                ];
                chPercMed.data.labels = meses;
                chPercMed.data.datasets[0].label = `% Médico/Mensalidade (${pSel})`;
                chPercMed.data.datasets[0].data = percSeries(meses, pSel, 'medico');

                chPercAlim.data.labels = meses;
                chPercAlim.data.datasets[0].label = `% Alimentação/Mensalidade (${pSel})`;
                chPercAlim.data.datasets[0].data = percSeries(meses, pSel, 'alimentacao');
            }

            buildTable(meses, pSel);
            chValores.update(); chPercMed.update(); chPercAlim.update();
        }

        function setDefaultRange() {
            if (MESES.length === 0) return;
            const last = MESES[MESES.length - 1];
            const [y, m] = last.split('-').map(Number);
            const d = new Date(y, m - 1, 1); d.setMonth(d.getMonth() - 11);
            el('#from').value = d.toISOString().slice(0, 7);
            el('#to').value = last;
        }

        function attachHandlers() {
            el('#from').addEventListener('change', render);
            el('#to').addEventListener('change', render);
            el('#reset').addEventListener('click', () => { el('#from').value = ''; el('#to').value = ''; render(); });
        }

        Promise.all([fetch(URL_GERAL), fetch(URL_POR_POSTO)])
            .then(async ([rg, rp]) => {
                if (!rg.ok) throw new Error(`HTTP ${rg.status} em ${URL_GERAL}`);
                if (!rp.ok) throw new Error(`HTTP ${rp.status} em ${URL_POR_POSTO}`);
                geral = await rg.json();
                porPosto = await rp.json();
                MESES = monthSort(Object.keys(geral));
                const last = porPosto[MESES[MESES.length - 1]] || {};
                POSTOS = Object.keys(last).sort();
                buildTabs(); initCharts(); setDefaultRange(); attachHandlers(); render();
            })
            .catch(showErr);
    </script>
</body>

</html>
