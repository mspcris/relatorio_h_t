        <div class="content-wrapper">

                <!-- FILTROS -->

                <div class="card-header d-flex justify-content-between align-items-center">

                <div class="card chart-card">

                </div>
                <div class="p-2" id="ia-medico" style="display:none;"></div>

                <!-- GRÁFICO % MÉDICO -->
                <div class="card chart-card">
                    <div class="card-header">
                        <h3 class="card-title">% Médico sobre Mensalidade</h3>

                </div>

                <!-- IA: ALIMENTAÇÃO -->
                <div class="card-header d-flex justify-content-between align-items-center">
                    <button class="btn btn-xs btn-outline-primary ia-btn" data-kind="alimentacao"
                        aria-pressed="false">IA</button>

                    <div class="card-header">

    <!-- JS vendors -->
    <script src="../node_modules/jquery/dist/jquery.min.js"></script>
    <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../node_modules/chart.js/dist/chart.umd.js"></script>

    <!-- Paths -->
    <script>
        const ROOT = location.pathname.replace(/\/templates\/[^/]*$/, '/') || '/';
        const API_ANALISAR = "/ia/analisar";
        const IA_BASE = ROOT + "json_retorno_groq";
        const URL_GERAL = ROOT + "json_consolidado/consolidado_mensal.json";
        const URL_POR_POSTO = ROOT + "json_consolidado/consolidado_mensal_por_posto.json";
    </script>

    <!-- App base -->
    <script>
        const el = s => document.querySelector(s);
        const showErr = e => { console.error(e); el('#err').textContent = e?.message || e; };
        const fmtNum = new Intl.NumberFormat('pt-BR', { maximumFractionDigits: 0 });
        const round2 = v => v == null ? null : Math.round(v * 100) / 100;
        const fmtPct = v => v == null ? '—' : `${Number(v).toFixed(2)}%`;
        const pctTick = v => `${Number(v).toFixed(2)}%`;

        let geral = {}, porPosto = {}, MESES = [], POSTOS = [];
        let chValores, chPercMed, chPercAlim;

        const monthSort = a => a.sort();
        const rangeFilter = (labels, from, to) => labels.filter(m => (!from || m >= from) && (!to || m <= to));
        function asArrayGeral(k, meses) { return meses.map(m => Number((geral[m] || {})[k] || 0)); }
        function asArrayPosto(k, meses, p) { return meses.map(m => Number((((porPosto[m] || {})[p]) || {})[k] || 0)); }
        function perc(vNum, vDen) { return vDen > 0 ? round2((vNum / vDen) * 100) : null; }

        function percSeries(meses, p, key) {
            const num = asArrayPosto(key, meses, p);
            const den = asArrayPosto('mensalidade', meses, p);
            return num.map((v, i) => perc(v, den[i]));
        }

        // fecha blocos IA
        function closeIA() {
            ['#ia-mensalidades', '#ia-medico', '#ia-alimentacao'].forEach(sel => {
                const b = document.querySelector(sel);
                if (!b) return;
                b.dataset.open = '0'; b.style.display = 'none'; b.innerHTML = '';
            });
            document.querySelectorAll('.ia-btn').forEach(b => {
                b.classList.remove('active'); b.setAttribute('aria-pressed', 'false');
                b.textContent = 'IA'; // reset rótulo
            });
        }

        function buildTabs() {
            const ul = el('#postoTabs'); ul.innerHTML = '';
            ul.insertAdjacentHTML('beforeend', `<li class="nav-item"><a data-posto="ALL" class="nav-link active" href="#">Todos</a></li>`);
            POSTOS.forEach(p => {
                ul.insertAdjacentHTML('beforeend', `<li class="nav-item"><a data-posto="${p}" class="nav-link" href="#">${p}</a></li>`);
                el('#postoSel').insertAdjacentHTML('beforeend', `<option value="${p}">${p}</option>`);
            });

            ul.addEventListener('click', e => {
                if (e.target.matches('.nav-link')) {
                    ul.querySelectorAll('.nav-link').forEach(a => a.classList.remove('active'));
                    e.target.classList.add('active');
                    el('#postoSel').value = e.target.dataset.posto;
                    closeIA();
                    render();
                }
            });

            el('#postoSel').addEventListener('change', () => {
                const p = el('#postoSel').value;
                ul.querySelectorAll('.nav-link').forEach(a => a.classList.toggle('active', a.dataset.posto === p));
                closeIA();
                render();
            });
        }

        function initCharts() {
            chValores = new Chart(el('#chartValores'), {
                type: 'line', data: { labels: [], datasets: [] },
                options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, scales: { y: { beginAtZero: true } } }
            });
            chPercMed = new Chart(el('#chartPercMed'), {
                type: 'line', data: { labels: [], datasets: [{ label: '% Médico/Mensalidade', data: [], tension: .2 }] },
                options: {
                    responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
                    scales: { y: { ticks: { callback: pctTick } } }, plugins: { tooltip: { callbacks: { label: ctx => `${Number(ctx.raw).toFixed(2)}%` } } }
                }
            });
            chPercAlim = new Chart(el('#chartPercAlim'), {
                type: 'line', data: { labels: [], datasets: [{ label: '% Alimentação/Mensalidade', data: [], tension: .2 }] },
                options: {
                    responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
                    scales: { y: { ticks: { callback: pctTick } } }, plugins: { tooltip: { callbacks: { label: ctx => `${Number(ctx.raw).toFixed(2)}%` } } }
                }
            });
        }

        function buildTable(meses, pSel) {
            const tb = el('#tblBody'); tb.innerHTML = '';
            let sumMens = 0, sumMed = 0, sumAli = 0, n = meses.length;

            meses.forEach(m => {
                let mens, med, ali;
                if (pSel === 'ALL') { const g = geral[m] || {}; mens = +g.mensalidade || 0; med = +g.medico || 0; ali = +g.alimentacao || 0; }
                else { const g = ((porPosto[m] || {})[pSel]) || {}; mens = +g.mensalidade || 0; med = +g.medico || 0; ali = +g.alimentacao || 0; }
                sumMens += mens; sumMed += med; sumAli += ali;
                const pMed = perc(med, mens), pAli = perc(ali, mens);
                tb.insertAdjacentHTML('beforeend', `
          <tr>
            <td>${m}</td>
            <td class="text-right">${fmtNum.format(mens)}</td>
            <td class="text-right">${fmtNum.format(med)}</td>
            <td class="text-right">${fmtNum.format(ali)}</td>
            <td class="text-right">${fmtPct(pMed)}</td>
            <td class="text-right">${fmtPct(pAli)}</td>
          </tr>`);
            });

            const avgMens = n ? Math.round(sumMens / n) : 0;
            const avgMed = n ? Math.round(sumMed / n) : 0;
            const avgAli = n ? Math.round(sumAli / n) : 0;
            const avgPctMed = sumMens > 0 ? round2((sumMed / sumMens) * 100) : null; // ponderada
            const avgPctAli = sumMens > 0 ? round2((sumAli / sumMens) * 100) : null;

            tb.insertAdjacentHTML('beforeend', `
        <tr>
          <td><b>Média</b></td>
          <td class="text-right"><b>${fmtNum.format(avgMens)}</b></td>
          <td class="text-right"><b>${fmtNum.format(avgMed)}</b></td>
          <td class="text-right"><b>${fmtNum.format(avgAli)}</b></td>
          <td class="text-right"><b>${fmtPct(avgPctMed)}</b></td>
          <td class="text-right"><b>${fmtPct(avgPctAli)}</b></td>
        </tr>`);

            tb.insertAdjacentHTML('beforeend', `
        <tr>
          <td><b>Total</b></td>
          <td class="text-right"><b>${fmtNum.format(sumMens)}</b></td>
          <td class="text-right"><b>${fmtNum.format(sumMed)}</b></td>
          <td class="text-right"><b>${fmtNum.format(sumAli)}</b></td>
          <td class="text-right"><b>—</b></td>
          <td class="text-right"><b>—</b></td>
        </tr>`);
        }

        function render() {
            const from = el('#from').value || null;
            const to = el('#to').value || null;
            const pSel = el('#postoSel').value;
            const meses = rangeFilter(MESES, from, to);

            if (pSel === 'ALL') {
                chValores.data.labels = meses;
                chValores.data.datasets = [
                    { label: 'Mensalidade', data: asArrayGeral('mensalidade', meses), tension: .2 },
                    { label: 'Médico', data: asArrayGeral('medico', meses), tension: .2 },
                    { label: 'Alimentação', data: asArrayGeral('alimentacao', meses), tension: .2 },
                ];
                chPercMed.data.labels = meses;
                chPercMed.data.datasets[0].label = '% Médico/Mensalidade';
                chPercMed.data.datasets[0].data = meses.map(m => { const g = geral[m] || {}; return perc(+g.medico || 0, +g.mensalidade || 0); });
                chPercAlim.data.labels = meses;
                chPercAlim.data.datasets[0].label = '% Alimentação/Mensalidade';
                chPercAlim.data.datasets[0].data = meses.map(m => { const g = geral[m] || {}; return perc(+g.alimentacao || 0, +g.mensalidade || 0); });
            } else {
                chValores.data.labels = meses;
                chValores.data.datasets = [
                    { label: `Mensalidade (${pSel})`, data: asArrayPosto('mensalidade', meses, pSel), tension: .2 },
                    { label: `Médico (${pSel})`, data: asArrayPosto('medico', meses, pSel), tension: .2 },
                    { label: `Alimentação (${pSel})`, data: asArrayPosto('alimentacao', meses, pSel), tension: .2 },
                ];
                chPercMed.data.labels = meses;
                chPercMed.data.datasets[0].label = `% Médico/Mensalidade (${pSel})`;
                chPercMed.data.datasets[0].data = percSeries(meses, pSel, 'medico');
                chPercAlim.data.labels = meses;
                chPercAlim.data.datasets[0].label = `% Alimentação/Mensalidade (${pSel})`;
                chPercAlim.data.datasets[0].data = percSeries(meses, pSel, 'alimentacao');
            }

            buildTable(meses, pSel);
            chValores.update(); chPercMed.update(); chPercAlim.update();
        }

        function monthToday() { const t = new Date(); return `${t.getFullYear()}-${String(t.getMonth() + 1).padStart(2, "0")}` }
        function lastCompleteMonth(labels) {
            const today = monthToday();
            const L = labels.filter(m => m !== today);
            return L.length ? L[L.length - 1] : labels[labels.length - 1];
        }

        function attachHandlers() {
            el('#from').addEventListener('change', () => { closeIA(); render(); });
            el('#to').addEventListener('change', () => { closeIA(); render(); });
            el('#reset').addEventListener('click', () => { el('#from').value = ''; el('#to').value = ''; closeIA(); render(); });
        }

        // carga dados
        Promise.all([
            fetch(URL_GERAL, { cache: 'no-store' }),
            fetch(URL_POR_POSTO, { cache: 'no-store' })
        ])
            .then(async ([rg, rp]) => {
                if (!rg.ok) throw new Error(`HTTP ${rg.status} em ${URL_GERAL}`);
                if (!rp.ok) throw new Error(`HTTP ${rp.status} em ${URL_POR_POSTO}`);
                geral = await rg.json(); porPosto = await rp.json();

                MESES = monthSort(Object.keys(geral)); window.MESES = MESES;
                const lastFull = lastCompleteMonth(MESES);
                const [y, m] = lastFull.split('-').map(Number);
                const d = new Date(y, m - 1, 1); d.setMonth(d.getMonth() - 11);
                el('#from').value = d.toISOString().slice(0, 7);
                el('#to').value = lastFull;

                const last = porPosto[lastFull] || {}; POSTOS = Object.keys(last).sort();
                buildTabs(); initCharts(); attachHandlers(); render();
            })
            .catch(err => { showErr(err); alert("Falha ao carregar JSONs. Veja o console."); });
    </script>











    <!-- IA: loader + parser + fetch -->
    <!-- IA: loader + parser + fetch -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const ROOT_IA = (window.ROOT || location.pathname.replace(/\/templates\/[^/]*$/, '/') || '/');
            const API_ANALISAR_IA = (window.API_ANALISAR || "/ia/analisar");
            const IA_BASE_IA = (window.IA_BASE || (ROOT_IA + "json_retorno_groq"));
            const isLocalHost = /^(localhost|127\.0\.0\.1)$/i.test(location.hostname);

            const pad2 = n => String(n).padStart(2, '0');
            const monthToday = () => { const t = new Date(); return `${t.getFullYear()}-${pad2(t.getMonth() + 1)}`; };
            const selectedRange = () => ({
                from: document.querySelector('#from')?.value || (window.MESES?.[0] || ''),
                to: document.querySelector('#to')?.value || (window.MESES?.at?.(-1) || '')
            });
            const includesCurrent = () => selectedRange().to === monthToday();
            const esc = s => String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[c]));
            const safeName = s => String(s || '').replace(/[^A-Za-z0-9_-]+/g, '_');

            function toProse(obj) {
                if (typeof obj !== 'string') {
                    try { if (typeof obj !== 'object') obj = JSON.parse(obj); } catch { obj = { resumo: String(obj) }; }
                    if (obj && typeof obj === 'object' && !Array.isArray(obj)) {
                        const parts = [];
                        if (obj.resumo) parts.push(`<h5><b>Resumo</b></h5><p>${esc(String(obj.resumo))}</p>`);
                        if (Array.isArray(obj.picos_e_vales) && obj.picos_e_vales.length)
                            parts.push(`<h5><b>Picos e vales</b></h5><ul>${obj.picos_e_vales.map(x => `<li>${esc(String(x))}</li>`).join('')}</ul>`);
                        if (obj.percentual_med_mens?.serie?.length) {
                            const itens = obj.percentual_med_mens.serie.map(s => `${esc(s.mes)} — ${Number(s.pct).toFixed(2)}%`);
                            parts.push(`<h5><b>Série % Médico/Mensalidade</b></h5><ul>${itens.map(x => `<li>${x}</li>`).join('')}</ul>`);
                        }
                        if (obj.percentual_alim_mens?.serie?.length) {
                            const itens = obj.percentual_alim_mens.serie.map(s => `${esc(s.mes)} — ${Number(s.pct).toFixed(2)}%`);
                            parts.push(`<h5><b>Série % Alimentação/Mensalidade</b></h5><ul>${itens.map(x => `<li>${x}</li>`).join('')}</ul>`);
                        }
                        if (Array.isArray(obj.alertas) && obj.alertas.length)
                            parts.push(`<h5><b>Alertas</b></h5><ul>${obj.alertas.map(x => `<li>${esc(String(x))}</li>`).join('')}</ul>`);
                        if (Array.isArray(obj.recomendacoes) && obj.recomendacoes.length)
                            parts.push(`<h5><b>Recomendações</b></h5><ul>${obj.recomendacoes.map(x => `<li>${esc(String(x))}</li>`).join('')}</ul>`);
                        return `<div class="ia-content">${parts.join('') || '<p>Sem conteúdo.</p>'}</div>`;
                    }
                }
                return `<div class="ia-content"><p>${esc(String(obj))}</p></div>`;
            }

            const loaders = new Map();
            function startDots(container) {
                const wrap = document.createElement('div');
                wrap.className = 'ia-content ia-loading';
                wrap.innerHTML = `Analisando <span class="ia-dots"><span class="dot on">.</span><span class="dot">.</span><span class="dot">.</span></span>`;
                container.innerHTML = ''; container.appendChild(wrap);
                let t = 0; const int = setInterval(() => { const d = wrap.querySelectorAll('.dot'); d.forEach(x => x.classList.remove('on')); d[t % 3].classList.add('on'); t++; }, 260);
                loaders.set(container, int);
            }
            function stopDots(container) { const int = loaders.get(container); if (int) { clearInterval(int); loaders.delete(container); } }

            const sleep = ms => new Promise(r => setTimeout(r, ms));
            const nextDelay = i => (i % 28 < 12 ? 12 : 34) + Math.random() * 22;
            async function typeInto(container, html) {
                const tmp = document.createElement('div'); tmp.innerHTML = html;
                const src = tmp.firstElementChild?.classList?.contains('ia-content') ? tmp.firstElementChild : tmp;
                container.innerHTML = ''; const wrap = document.createElement('div'); wrap.className = 'ia-content'; container.appendChild(wrap);
                for (const node of src.children) {
                    const tag = node.tagName;
                    if (tag === 'H5') { const h = document.createElement('h5'); h.innerHTML = node.innerHTML; wrap.appendChild(h); await sleep(120); continue; }
                    if (tag === 'UL') { const ul = document.createElement('ul'); ul.innerHTML = node.innerHTML; wrap.appendChild(ul); await sleep(90); continue; }
                    if (tag === 'P') {
                        const p = document.createElement('p'); wrap.appendChild(p); const text = node.textContent || ''; p.textContent = '';
                        for (let i = 0; i < text.length; i++) { p.textContent += text[i]; await sleep(nextDelay(i)); } continue;
                    }
                    wrap.appendChild(node.cloneNode(true));
                }
            }

            // -------- JSON local com validação de Content-Type e nomes seguros
            // retorna {data, source:'json', file, tried}
            async function getStatic(kind, from, to, posto) {
                const raw = String(posto || 'ALL');
                const safe = safeName(raw);
                const candFiles = [
                    `${from}_${to}_${raw}_${kind}.json`,
                    `${from}_${to}_${raw.toUpperCase()}_${kind}.json`,
                    `${from}_${to}_${safe}_${kind}.json`,
                    `${from}_${to}_${safe.toUpperCase()}_${kind}.json`,
                    `${from}_${to}_${kind}.json`,
                    ...(raw.toUpperCase() === 'ALL' ? [] : [`${from}_${to}_ALL_${kind}.json`]) // será tentado manualmente no caller
                ];
                const tried = [];
                for (const f of candFiles) {
                    const url = `${IA_BASE_IA}/${f}?t=${Date.now()}`;
                    tried.push(f);
                    const r = await fetch(url, { cache: 'no-store' });
                    if (!r.ok) continue;
                    const ctype = (r.headers.get('content-type') || '').toLowerCase();
                    if (!ctype.includes('application/json')) {
                        // evita "Unexpected token '<'"
                        const snippet = (await r.text()).slice(0, 120);
                        console.warn(`[IA] Conteúdo não JSON em ${f}: ${ctype}. Trecho:`, snippet);
                        continue;
                    }
                    const data = await r.json();
                    return { data, source: 'json', file: url, tried };
                }
                throw new Error(`JSON local não encontrado. Tentativas: ${tried.join(', ')}`);
            }

            // -------- Orquestração API → fallback posto → fallback ALL
            // retorna {data, source:'api'|'json', file?}
            async function fetchIA(kind) {
                const { from, to } = selectedRange();
                const posto = document.querySelector('#postoSel')?.value || 'ALL';
                if (!from || !to) throw new Error('Período inválido.');
                if (includesCurrent()) throw new Error('Selecione apenas meses completos.');

                if (isLocalHost) return await getStatic(kind, from, to, posto);

                try {
                    const r = await fetch(API_ANALISAR_IA, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ from_ym: from, to_ym: to, posto }) });
                    if (!r.ok) throw new Error(`HTTP ${r.status}`);
                    const payload = await r.json();
                    if (!(kind in payload)) throw new Error('Campo ausente: ' + kind);
                    return { data: payload[kind], source: 'api' };
                } catch (apiErr) {
                    console.warn('[IA] API falhou, tentando JSON do posto...', apiErr);
                    try {
                        return await getStatic(kind, from, to, posto);
                    } catch (e1) {
                        console.warn('[IA] JSON do posto indisponível, tentando JSON de ALL...', e1);
                        return await getStatic(kind, from, to, 'ALL');
                    }
                }
            }

            // estado inicial dos containers IA
            ['ia-mensalidades', 'ia-medico', 'ia-alimentacao'].forEach(id => {
                const box = document.getElementById(id);
                if (box && !box.dataset.open) box.dataset.open = '0';
            });

            // Clique IA + rótulo "IA J" quando vier de JSON
            document.addEventListener('click', async ev => {
                const btn = ev.target.closest('.ia-btn'); if (!btn) return;
                const kind = btn.dataset.kind;
                const targetId = kind === 'mensalidades' ? 'ia-mensalidades' : (kind === 'medico' ? 'ia-medico' : 'ia-alimentacao');
                const box = document.getElementById(targetId); if (!box) { console.error('Container IA inexistente:', targetId); return; }

                const open = box.dataset.open === '1';
                document.querySelectorAll('.ia-btn').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-pressed', 'false'); });
                if (open) { box.dataset.open = '0'; box.style.display = 'none'; stopDots(box); box.innerHTML = ''; return; }

                btn.classList.add('active'); btn.setAttribute('aria-pressed', 'true');
                btn.textContent = 'IA';
                box.style.display = 'block'; box.dataset.open = '1';
                startDots(box);

                try {
                    const { data, source, file } = await fetchIA(kind);
                    btn.textContent = (source === 'json' ? 'IA J' : 'IA');
                    if (source === 'json' && file) console.info('[IA] carregado de JSON:', file);
                    const prose = toProse(data);
                    await sleep(300);
                    stopDots(box);
                    await typeInto(box, prose);
                } catch (err) {
                    stopDots(box);
                    const { from, to } = selectedRange();
                    box.innerHTML = `<div class="alert alert-warning p-2 mb-0">IA indisponível para <code>${from}..${to}</code>. ${esc(err.message || err)}</div>`;
                    console.error(err);
                    btn.textContent = 'IA';
                }
            });

            // Fechar IA ao mudar filtros
            ['#from', '#to', '#postoSel'].forEach(sel => {
                document.addEventListener('change', e => {
                    if (!e.target.matches(sel)) return;
                    if (typeof closeIA === 'function') closeIA();
                });
            });

            window.onerror = function (msg, src, line, col, err) {
                const box = document.querySelector('#err');
                if (box) box.textContent = `[JS] ${msg} @ ${src}:${line}:${col}`;
                console.error('[JS ERROR]', msg, src, line, col, err);
            };
        });
    </script>
