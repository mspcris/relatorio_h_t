<!doctype html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>CAMIM — Admin Usuários</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.4/css/all.min.css">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style2.css">
<link rel="shortcut icon" href="images/Logo Camim-01_200px.png" type="image/x-icon">
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<style>
  html { font-size: 16px; }
  body { font-size: 1rem; font-family: "Source Sans Pro", system-ui, sans-serif; }
  .badge-posto {
    display: inline-block;
    background: #e8f5e9;
    color: #2e7d32;
    border: 1px solid #a5d6a7;
    border-radius: 4px;
    padding: 1px 7px;
    font-size: .78rem;
    font-weight: 600;
    margin: 1px;
  }
  .posto-check label {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin: 3px 5px 3px 0;
    font-size: .9rem;
    cursor: pointer;
  }
  .table td, .table th { vertical-align: middle; }
  #toast-wrap {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
  }
  .toast-msg {
    background: #1e3a2f;
    color: #fff;
    border-radius: 8px;
    padding: 12px 20px;
    margin-top: 8px;
    font-size: .9rem;
    box-shadow: 0 4px 14px rgba(0,0,0,.3);
    animation: fadeInUp .3s ease;
  }
  .toast-msg.erro { background: #5c1a1a; }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<body class="hold-transition sidebar-mini">
<div class="wrapper">

  <!-- NAVBAR -->
  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
      </li>
    </ul>
    <span class="ml-2 font-weight-bold d-flex align-items-center">
      <img src="/images/Logo Camim-01_200px.png" alt="Logo Camim" style="height:28px;width:auto">
      <span class="ml-2">Painel Admin — Usuários</span>
    </span>
  </nav>

  <!-- SIDEBAR -->
  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <a href="index.html" class="brand-link"><span class="brand-text font-weight-light">ADMIN</span></a>
    <div class="sidebar">
      <nav class="mt-2">
        <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu" data-accordion="false">
          <li class="nav-item"><a href="/" class="nav-link"><i class="nav-icon fas fa-home"></i><p>Home Page</p></a></li>
                        {% if USER_IS_ADMIN %}
                        <li class="nav-item"><a href="/admin" class="nav-link" style="border-left:3px solid #f39c12"><i class="nav-icon fas fa-users-cog" style="color:#f39c12"></i><p>Admin</p></a></li>
                        {% endif %}
          <li class="nav-item"><a href="/admin" class="nav-link active"><i class="nav-icon fas fa-users-cog"></i><p>Usuários</p></a></li>
          <li class="nav-item">
            <form method="POST" action="/session/logout" style="display:inline">
              <button type="submit" class="nav-link btn btn-link p-0" style="text-align:left">
                <i class="nav-icon fas fa-sign-out-alt"></i><p>Sair</p>
              </button>
            </form>
          </li>
        </ul>
      </nav>
    </div>
  </aside>

  <!-- CONTEÚDO -->
  <div class="content-wrapper">
    <section class="content p-3">

      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Usuários do sistema</h2>
        <button class="btn btn-primary" onclick="abrirModalNovo()">
          <i class="fas fa-plus mr-1"></i> Novo usuário
        </button>
      </div>

      <div class="card">
        <div class="card-body p-0">
          <table class="table table-hover table-sm mb-0" id="tbl">
            <thead class="thead-light">
              <tr>
                <th>E-mail</th>
                <th>Nome</th>
                <th>Postos</th>
                <th style="width:80px">Admin</th>
                <th style="width:80px">Ativo</th>
                <th style="width:160px">Ações</th>
              </tr>
            </thead>
            <tbody id="tbody">
              <tr><td colspan="6" class="text-center text-muted py-4">Carregando…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </section>
  </div>

</div>

<!-- ── MODAL NOVO / EDITAR ────────────────────────────────────────────────── -->
<div class="modal fade" id="modal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitulo">Novo usuário</h5>
        <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="uid">

        <div class="form-row">
          <div class="form-group col-md-7">
            <label>E-mail <span class="text-danger">*</span></label>
            <input type="email" id="f-email" class="form-control" placeholder="usuario@camim.com.br">
          </div>
          <div class="form-group col-md-5">
            <label>Nome</label>
            <input type="text" id="f-nome" class="form-control" placeholder="Nome do usuário">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group col-md-6">
            <label>Senha <small class="text-muted">(deixe em branco para não alterar)</small></label>
            <input type="password" id="f-senha" class="form-control" placeholder="mínimo 8 caracteres" autocomplete="new-password">
          </div>
          <div class="form-group col-md-3 d-flex align-items-end">
            <div class="custom-control custom-switch mb-2">
              <input type="checkbox" class="custom-control-input" id="f-admin">
              <label class="custom-control-label" for="f-admin">Admin</label>
            </div>
          </div>
          <div class="form-group col-md-3 d-flex align-items-end">
            <div class="custom-control custom-switch mb-2">
              <input type="checkbox" class="custom-control-input" id="f-ativo" checked>
              <label class="custom-control-label" for="f-ativo">Ativo</label>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Postos com acesso</label>
          <div class="posto-check" id="postos-check">
            <!-- gerado via JS -->
          </div>
          <small class="text-muted">Selecione quais postos este usuário pode visualizar.</small>
        </div>

        <div id="modal-erro" class="text-danger small" style="min-height:18px"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" id="btnSalvar" onclick="salvar()">Salvar</button>
      </div>
    </div>
  </div>
</div>

<!-- ── TOAST ──────────────────────────────────────────────────────────────── -->
<div id="toast-wrap"></div>

<script>
const TODOS_POSTOS = ['A','B','C','D','G','I','J','M','N','P','R','X','Y'];
let _usuarios = [];

// ── Inicialização ─────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // monta checkboxes de postos
  const wrap = document.getElementById('postos-check');
  TODOS_POSTOS.forEach(p => {
    wrap.innerHTML += `
      <label>
        <input type="checkbox" class="posto-cb" value="${p}"> ${p}
      </label>`;
  });
  carregar();
});

// ── Carregar lista ────────────────────────────────────────────────────────────
async function carregar() {
  const r = await fetch('/admin/api/usuarios');
  if (!r.ok) { toast('Erro ao carregar usuários', true); return; }
  _usuarios = await r.json();
  renderTabela();
}

function renderTabela() {
  const tbody = document.getElementById('tbody');
  if (!_usuarios.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">Nenhum usuário cadastrado.</td></tr>';
    return;
  }
  tbody.innerHTML = _usuarios.map(u => `
    <tr>
      <td>${u.email}</td>
      <td>${u.nome || '<span class="text-muted">—</span>'}</td>
      <td>${u.postos.map(p => `<span class="badge-posto">${p}</span>`).join('') || '<span class="text-muted">nenhum</span>'}</td>
      <td class="text-center">${u.is_admin ? '<i class="fas fa-shield-alt text-warning" title="Admin"></i>' : ''}</td>
      <td class="text-center">
        <span class="badge badge-${u.ativo ? 'success' : 'secondary'}">${u.ativo ? 'Sim' : 'Não'}</span>
      </td>
      <td>
        <button class="btn btn-xs btn-outline-primary mr-1" title="Editar" onclick="editar(${u.id})">
          <i class="fas fa-edit"></i>
        </button>
        <button class="btn btn-xs btn-outline-info mr-1" title="Enviar link de reset" onclick="enviarReset(${u.id}, '${u.email}')">
          <i class="fas fa-key"></i>
        </button>
        <button class="btn btn-xs btn-outline-danger" title="Excluir" onclick="excluir(${u.id}, '${u.email}')">
          <i class="fas fa-trash"></i>
        </button>
      </td>
    </tr>`).join('');
}

// ── Modal novo ────────────────────────────────────────────────────────────────
function abrirModalNovo() {
  document.getElementById('modalTitulo').textContent = 'Novo usuário';
  document.getElementById('uid').value      = '';
  document.getElementById('f-email').value  = '';
  document.getElementById('f-nome').value   = '';
  document.getElementById('f-senha').value  = '';
  document.getElementById('f-admin').checked = false;
  document.getElementById('f-ativo').checked = true;
  document.getElementById('f-email').disabled = false;
  document.getElementById('modal-erro').textContent = '';
  document.querySelectorAll('.posto-cb').forEach(cb => cb.checked = false);
  $('#modal').modal('show');
}

// ── Modal editar ──────────────────────────────────────────────────────────────
function editar(id) {
  const u = _usuarios.find(x => x.id === id);
  if (!u) return;
  document.getElementById('modalTitulo').textContent = 'Editar usuário';
  document.getElementById('uid').value       = u.id;
  document.getElementById('f-email').value   = u.email;
  document.getElementById('f-nome').value    = u.nome;
  document.getElementById('f-senha').value   = '';
  document.getElementById('f-admin').checked = u.is_admin;
  document.getElementById('f-ativo').checked = u.ativo;
  document.getElementById('f-email').disabled = true;
  document.getElementById('modal-erro').textContent = '';
  document.querySelectorAll('.posto-cb').forEach(cb => {
    cb.checked = u.postos.includes(cb.value);
  });
  $('#modal').modal('show');
}

// ── Helper: fetch que nunca explode no .json() ────────────────────────────────
async function api(url, opts = {}) {
  const r = await fetch(url, opts);
  let data = {};
  try { data = await r.json(); } catch (_) {}
  return { ok: r.ok, status: r.status, data };
}

// ── Salvar (criar ou editar) ──────────────────────────────────────────────────
async function salvar() {
  const uid    = document.getElementById('uid').value;
  const email  = document.getElementById('f-email').value.trim();
  const nome   = document.getElementById('f-nome').value.trim();
  const senha  = document.getElementById('f-senha').value;
  const admin  = document.getElementById('f-admin').checked;
  const ativo  = document.getElementById('f-ativo').checked;
  const postos = [...document.querySelectorAll('.posto-cb:checked')].map(cb => cb.value);
  const erroEl = document.getElementById('modal-erro');
  erroEl.textContent = '';

  if (!uid && !email) { erroEl.textContent = 'E-mail obrigatório.'; return; }
  if (!uid && senha.length < 8) { erroEl.textContent = 'Senha mínima de 8 caracteres para novos usuários.'; return; }

  const payload = { nome, is_admin: admin, ativo, postos };
  if (!uid) payload.email = email;
  if (senha) payload.senha = senha;

  const url = uid ? `/admin/api/usuarios/${uid}` : '/admin/api/usuarios';
  const btn = document.getElementById('btnSalvar');
  btn.disabled = true;

  try {
    const { ok, status, data } = await api(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!ok) {
      erroEl.textContent = data.erro || `Erro ${status} ao salvar.`;
      return;
    }
    $('#modal').modal('hide');
    toast(uid ? 'Usuário atualizado.' : 'Usuário criado.');
    await carregar();
  } catch (e) {
    erroEl.textContent = `Falha de rede: ${e.message}`;
  } finally {
    btn.disabled = false;
  }
}

// ── Excluir ───────────────────────────────────────────────────────────────────
async function excluir(id, email) {
  if (!confirm(`Excluir o usuário "${email}"?`)) return;
  const { ok, status, data } = await api(`/admin/api/usuarios/${id}/delete`, { method: 'POST' });
  if (!ok) { toast(data.erro || `Erro ${status} ao excluir.`, true); return; }
  toast('Usuário excluído.');
  await carregar();
}

// ── Enviar reset ──────────────────────────────────────────────────────────────
async function enviarReset(id, email) {
  if (!confirm(`Enviar link de redefinição de senha para "${email}"?`)) return;
  const { ok, status, data } = await api(`/admin/api/usuarios/${id}/reset`, { method: 'POST' });
  if (!ok) { toast(data.erro || `Erro ${status}.`, true); return; }
  toast(data.ok ? `Link enviado para ${email}.` : 'Falha ao enviar e-mail.', !data.ok);
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, erro = false) {
  const wrap = document.getElementById('toast-wrap');
  const el   = document.createElement('div');
  el.className = 'toast-msg' + (erro ? ' erro' : '');
  el.innerHTML = `<i class="fas fa-${erro ? 'exclamation-circle' : 'check-circle'} mr-2"></i>${msg}`;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
</script>
</body>
</html>
