<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <title>Admin • Usuários</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="csrf-token" content="">
    <link rel="stylesheet" href="/css/style.css?v=6">
    <script src="/js/menu.js" defer></script>
    <script src="/js/header.js" defer></script>
    <script src="/js/footer.js" defer></script>

    <style>
        :root {
            --gap: 16px
        }

        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, "Helvetica Neue", Arial
        }

        .page {
            max-width: 1100px;
            margin: 0 auto;
            padding: var(--gap)
        }

        .card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, .08);
            padding: 20px
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--gap)
        }

        @media (max-width: 960px) {
            .grid {
                grid-template-columns: 1fr
            }
        }

        h2 {
            margin: 0 0 6px
        }

        .muted {
            color: #6b7280
        }

        label {
            display: block;
            margin-top: 10px
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="search"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            box-sizing: border-box
        }

        .btn {
            display: inline-block;
            padding: 10px 14px;
            border: 0;
            border-radius: 10px;
            cursor: pointer
        }

        .btn-pri {
            background: linear-gradient(135deg, #b7f28d, #7ed957);
            color: #111
        }

        .btn-sec {
            background: #e5e7eb
        }

        .btn-warn {
            background: #fde68a
        }

        .btn-del {
            background: #fecaca
        }

        .row-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end
        }

        .right {
            text-align: right
        }

        .mt8 {
            margin-top: 8px
        }

        .mt12 {
            margin-top: 12px
        }

        .mt16 {
            margin-top: 16px
        }

        table {
            width: 100%;
            border-collapse: collapse
        }

        thead th {
            text-align: left;
            font-weight: 600;
            padding: 10px 8px;
            border-bottom: 1px solid #eee
        }

        tbody td {
            padding: 10px 8px;
            border-bottom: 1px solid #f2f2f2;
            vertical-align: middle
        }

        .badge {
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 12px
        }

        .ok {
            background: #d1fae5
        }

        .pendente {
            background: #fee2e2
        }

        .quitado {
            background: #e0e7ff
        }

        .searchbar {
            display: flex;
            gap: 8px;
            margin: 8px 0
        }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .35);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 16px
        }

        .modal .box {
            background: #fff;
            border-radius: 14px;
            padding: 20px;
            width: 100%;
            max-width: 460px
        }

        .hide {
            display: none !important
        }
    </style>
</head>

<body>
    <div id="header"></div>

    <main class="page">
        <section class="card">
            <h2>Administração de Usuários</h2>
            <p class="muted">Somente perfil autorizado. Operações: criar, redefinir senha, desabilitar/reativar,
                excluir.</p>
            <div id="me" class="muted" aria-live="polite"></div>

            <div class="grid mt12">
                <!-- Coluna esquerda: formulário -->
                <form id="frmNew" autocomplete="off">
                    <h3>Novo usuário</h3>
                    <label>Nome completo
                        <input type="text" name="full_name" required>
                    </label>
                    <label>E-mail
                        <input type="email" name="email" required>
                    </label>
                    <label>Usuário (login)
                        <input type="text" name="username" minlength="3" required>
                    </label>
                    <label>Senha inicial
                        <input type="password" name="password" minlength="6" required>
                    </label>
                    <label class="mt8">
                        <input type="checkbox" name="is_admin"> Administrador
                    </label>
                    <button class="btn btn-pri mt16" type="submit">Criar</button>
                    <div id="newMsg" class="muted mt8"></div>
                </form>

                <!-- Coluna direita: listagem -->
                <div>
                    <div class="searchbar">
                        <input id="q" type="search" placeholder="Filtrar por nome, e-mail ou usuário">
                        <button id="btnRefresh" class="btn btn-sec" type="button">Atualizar</button>
                    </div>

                    <table aria-label="Usuários">
                        <thead>
                            <tr>
                                <th>Usuário</th>
                                <th>Nome</th>
                                <th>E-mail</th>
                                <th>Status</th>
                                <th class="right">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tbl"></tbody>
                    </table>
                    <p id="count" class="muted mt8"></p>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal: redefinir senha -->
    <section id="pwModal" class="modal hide" role="dialog" aria-modal="true" aria-labelledby="pwTitle">
        <div class="box">
            <h3 id="pwTitle">Redefinir senha</h3>
            <p class="muted" id="pwUser"></p>
            <label>Nova senha
                <input id="pw1" type="password" minlength="6" required>
            </label>
            <label>Confirmar
                <input id="pw2" type="password" minlength="6" required>
            </label>
            <div class="mt12 right">
                <button id="pwCancel" class="btn btn-sec" type="button">Cancelar</button>
                <button id="pwSave" class="btn btn-pri" type="button">Aplicar</button>
                <span id="pwMsg" class="muted" style="margin-left:8px"></span>
            </div>
        </div>
    </section>

    <div id="footer"></div>

    <script>
        // ===== Endpoints =====
        const API = {
            me: '/session/me',                                    // GET -> {username,email,is_admin}
            list: '/api/admin/users',                             // GET -> [{id,username,full_name,email,disabled,is_admin}]
            create: '/api/admin/users',                           // POST JSON
            disable: id => `/api/admin/users/${id}/disable`,      // POST {disabled:true|false}
            resetPw: id => `/api/admin/users/${id}/reset_password`, // POST {password:""}
            del: id => `/api/admin/users/${id}`                   // DELETE
        };

        // ===== Helpers =====
        const $ = s => document.querySelector(s);
        const csrf = () => $('meta[name="csrf-token"]')?.content || '';
        const hdr = () => {
            const h = { 'Content-Type': 'application/json' };
            const t = csrf(); if (t) h['X-CSRF-Token'] = t;
            return h;
        };

        // ===== Gate de acesso =====
        async function assertOwner() {
            try {
                const r = await fetch(API.me, { credentials: 'include', cache: 'no-store' });
                if (r.status === 401 || r.status === 403) { location.href = '/login.html'; return false; }
                if (!r.ok) { fatal('Falha ao validar sessão.'); return false; }
                const me = await r.json();
                $('#me').textContent = `Logado como: ${me.username}`;
                const allowed = me.username === 'cristiano' || me.is_admin === true;
                if (!allowed) {
                    document.body.innerHTML =
                        '<main class="page"><section class="card"><h2>Acesso negado</h2><p class="muted">Recurso exclusivo do administrador.</p></section></main>';
                    return false;
                }
                return true;
            } catch (e) { fatal('Erro de rede ao validar sessão.'); return false; }
        }
        function fatal(msg) {
            document.body.innerHTML = `<main class="page"><section class="card"><h2>Indisponível</h2><p class="muted">${msg}</p></section></main>`;
        }

        // ===== Listagem =====
        async function load() {
            const r = await fetch(API.list, { credentials: 'include', cache: 'no-store' });
            if (!r.ok) { alert('Falha ao carregar usuários'); return; }
            let data = await r.json();
            const q = $('#q').value.trim().toLowerCase();
            if (q) {
                data = data.filter(u => [u.username, u.full_name, u.email].join(' ').toLowerCase().includes(q));
            }
            renderTable(data);
        }

        function renderTable(rows) {
            const tb = $('#tbl'); tb.innerHTML = '';
            rows.forEach(u => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
          <td data-label="Usuário">${u.username}${u.is_admin ? ' <span class="badge quitado">admin</span>' : ''}</td>
          <td data-label="Nome">${u.full_name || '-'}</td>
          <td data-label="E-mail">${u.email || '-'}</td>
          <td data-label="Status">${u.disabled ? '<span class="badge pendente">desabilitado</span>' : '<span class="badge ok">ativo</span>'}</td>
          <td class="right" data-label="Ações">
            <div class="row-actions">
              <button class="btn btn-warn" data-act="pw" data-id="${u.id}" data-user="${u.username}">Alterar senha</button>
              <button class="btn btn-sec" data-act="toggle" data-id="${u.id}" data-disabled="${u.disabled ? 0 : 1}">
                ${u.disabled ? 'Reativar' : 'Desabilitar'}
              </button>
              <button class="btn btn-del" data-act="del" data-id="${u.id}">Excluir</button>
            </div>
          </td>`;
                tb.appendChild(tr);
            });
            $('#count').textContent = `${rows.length} usuário(s)`;
        }

        // ===== Ações (senha, toggle, excluir) =====
        document.addEventListener('click', async (e) => {
            const btn = e.target.closest('button[data-act]');
            if (!btn) return;
            const id = btn.dataset.id;
            const act = btn.dataset.act;

            if (act === 'pw') { openPw(id, btn.dataset.user); return; }

            if (act === 'toggle') {
                const to = btn.dataset.disabled === '1';
                if (!confirm(`${to ? 'Desabilitar' : 'Reativar'} este usuário?`)) return;
                const r = await fetch(API.disable(id), {
                    method: 'POST', headers: hdr(), body: JSON.stringify({ disabled: to }), credentials: 'include'
                });
                if (!r.ok) { alert('Falha ao atualizar status'); return; }
                load(); return;
            }

            if (act === 'del') {
                if (!confirm('Excluir usuário de forma permanente?')) return;
                const r = await fetch(API.del(id), { method: 'DELETE', headers: hdr(), credentials: 'include' });
                if (!r.ok) { alert('Falha ao excluir'); return; }
                load(); return;
            }
        });

        // ===== Modal de senha =====
        let pwUserId = null;
        function openPw(id, username) {
            pwUserId = id;
            $('#pwUser').textContent = `Usuário: ${username}`;
            $('#pw1').value = ''; $('#pw2').value = ''; $('#pwMsg').textContent = '';
            $('#pwModal').classList.remove('hide');
            $('#pw1').focus();
        }
        $('#pwCancel').onclick = () => $('#pwModal').classList.add('hide');
        $('#pwSave').onclick = async () => {
            const a = $('#pw1').value.trim(), b = $('#pw2').value.trim();
            if (a.length < 6) { $('#pwMsg').textContent = 'Mínimo 6 caracteres.'; return; }
            if (a !== b) { $('#pwMsg').textContent = 'Senhas não conferem.'; return; }
            const r = await fetch(API.resetPw(pwUserId), {
                method: 'POST', headers: hdr(), body: JSON.stringify({ password: a }), credentials: 'include'
            });
            if (!r.ok) { $('#pwMsg').textContent = 'Erro ao redefinir.'; return; }
            $('#pwMsg').textContent = 'Senha atualizada.';
            setTimeout(() => $('#pwModal').classList.add('hide'), 600);
        };

        // ===== Novo usuário =====
        $('#frmNew').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const payload = Object.fromEntries(fd.entries());
            payload.is_admin = !!fd.get('is_admin');
            const r = await fetch(API.create, {
                method: 'POST', headers: hdr(), body: JSON.stringify(payload), credentials: 'include'
            });
            if (!r.ok) { $('#newMsg').textContent = 'Falha ao criar.'; return; }
            e.target.reset(); $('#newMsg').textContent = 'Criado com sucesso.';
            load();
        });

        // ===== Filtro / refresh =====
        $('#q').addEventListener('input', load);
        $('#btnRefresh').addEventListener('click', load);

        // ===== Boot =====
        (async function () {
            const ok = await assertOwner();
            if (!ok) return;
            await load();
        })();
    </script>
    <script defer>
        (async () => {
            const r = await fetch('/session/me', { credentials: 'include', cache: 'no-store' });
            if (!r.ok) { location.href = '/login.html'; return; }
            const me = await r.json();

            const ALLOWED_EMAIL = 'cristiano@camim.com.br';
            const isAllowed =
                (me.email && me.email.toLowerCase() === ALLOWED_EMAIL) ||
                me.is_admin === true; // opcional

            if (!isAllowed) {
                document.body.innerHTML =
                    '<main class="page"><section class="card"><h2>Acesso negado</h2></section></main>';
                return;
            }
            // segue render normal
        })();
    </script>

</body>

</html>
