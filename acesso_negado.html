<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CAMIM — Acesso Negado</title>
  <link rel="stylesheet" href="/css/adminlte.min.css">
  <link rel="stylesheet" href="/css/all.min.css">
  <style>
    body { background: #f4f6f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card-acesso { background: #fff; border-radius: 10px; box-shadow: 0 4px 24px rgba(0,0,0,.1); padding: 48px 40px; max-width: 480px; width: 100%; text-align: center; }
    .icon-lock { font-size: 3.5rem; color: #e74c3c; margin-bottom: 16px; }
    h2 { font-size: 1.5rem; font-weight: 700; color: #2c3e50; margin-bottom: 8px; }
    p { color: #636e72; margin-bottom: 24px; }
    .btn-home { display: inline-block; background: #007bff; color: #fff; padding: 10px 28px; border-radius: 6px; text-decoration: none; font-weight: 600; transition: background .2s; }
    .btn-home:hover { background: #0056b3; color: #fff; text-decoration: none; }
    .email-badge { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 4px; padding: 4px 10px; font-size: .85rem; color: #495057; margin-bottom: 20px; display: inline-block; }
  </style>
</head>
<body>
  <div class="card-acesso">
    <div class="icon-lock"><i class="fas fa-lock"></i></div>
    <h2>Acesso não autorizado</h2>
    <p>Você não tem permissão para acessar esta página.<br>Entre em contato com o administrador do sistema.</p>
    {% if USER_EMAIL %}
    <div class="email-badge"><i class="fas fa-user mr-1"></i>{{ USER_EMAIL }}</div><br>
    {% endif %}
    <a href="/kpi_home" class="btn-home"><i class="fas fa-home mr-2"></i>Ir para o início</a>
  </div>
</body>
</html>
